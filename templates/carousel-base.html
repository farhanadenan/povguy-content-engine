<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>POV Guy Carousel Slide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ===== POV GUY DESIGN SYSTEM (v4 — Glassmorphism vibe, scaled for 1080x1350) ===== */
  :root {
    --blue:        #1A44F0;
    --blue-vivid:  #2C55F5;
    --blue-bright: #4D72FF;
    --blue-dim:    rgba(26,68,240,0.12);
    --blue-border: rgba(77,114,255,0.20);
    --bg:   #03071A;
    --bg2:  #060C24;
    --bg3:  #0A1232;
    --white:     #FFFFFF;
    --off-white: #E8EEFF;
    --muted:     #6B82C0;
    --muted2:    #3D5090;
    --green: #00E87B;
    --red:   #FF4D4D;
    --amber: #E8C040;
    --gold:  #C9A84C;
    --mono:    'IBM Plex Mono', monospace;
    --display: 'Space Grotesk', sans-serif;
    --body:    'Inter', sans-serif;
    --slide-w: 1080px;
    --slide-h: 1350px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: var(--slide-w);
    height: var(--slide-h);
    overflow: hidden;
    background: #000;
    font-family: var(--body);
    color: var(--white);
    -webkit-font-smoothing: antialiased;
  }

  /* ===== Base slide canvas ===== */
  .slide {
    position: relative;
    width: var(--slide-w);
    height: var(--slide-h);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: var(--bg);
  }
  .slide.bg2 { background: var(--bg2); }
  .slide.bg3 { background: var(--bg3); }

  /* ===== Background decoration layers (purely decorative) ===== */
  .glow {
    position: absolute;
    pointer-events: none;
    border-radius: 50%;
  }
  .glow.blue-cr {
    top: 18%; right: -160px;
    width: 840px; height: 840px;
    background: radial-gradient(ellipse, rgba(26,68,240,0.36) 0%, rgba(26,68,240,0.08) 45%, transparent 70%);
  }
  .glow.red-tl {
    top: -80px; left: -80px;
    width: 480px; height: 480px;
    background: radial-gradient(ellipse, rgba(255,77,77,0.16) 0%, transparent 65%);
  }
  .glow.gold-tr {
    top: -80px; right: -80px;
    width: 440px; height: 440px;
    background: radial-gradient(circle, rgba(232,192,64,0.18) 0%, transparent 65%);
  }
  .glow.blue-bl {
    bottom: -80px; left: -80px;
    width: 360px; height: 360px;
    background: radial-gradient(circle, rgba(26,68,240,0.20) 0%, transparent 65%);
  }
  .glow.center {
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 1000px; height: 1000px;
    background: radial-gradient(ellipse, rgba(26,68,240,0.30) 0%, rgba(26,68,240,0.08) 40%, transparent 70%);
  }
  .dotgrid {
    position: absolute; inset: 0;
    opacity: 0.07;
    pointer-events: none;
  }
  .top-accent {
    position: absolute; top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--red) 0%, var(--blue-bright) 60%, transparent 100%);
  }
  .top-accent.gold {
    background: linear-gradient(90deg, transparent, var(--amber), var(--green), transparent);
  }

  /* ===== Chrome (slide num, brand mark, watermark) ===== */
  .slide-num {
    position: absolute;
    top: 40px; right: 44px;
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 400;
    color: var(--muted2);
    letter-spacing: 0.05em;
    z-index: 5;
  }
  .brand-mark {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-family: var(--mono);
    font-size: 16px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .brand-mark .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--blue-bright);
    box-shadow: 0 0 12px rgba(77,114,255,0.9);
  }
  .brand-mark .name { color: var(--off-white); font-weight: 500; }
  .brand-mark .name span { color: var(--blue-bright); }

  .footer-wm {
    position: absolute;
    bottom: 36px; right: 44px;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--muted2);
    letter-spacing: 0.08em;
    z-index: 5;
  }
  .footer-wm.left {
    right: auto;
    left: 44px;
  }

  /* ===== Brand logo (chrome footer + featured placements) ===== */
  .brand-img {
    height: 28px;
    width: auto;
    opacity: 0.85;
    display: block;
  }
  .footer-logo {
    position: absolute;
    bottom: 32px; left: 44px;
    z-index: 5;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .footer-logo .brand-img {
    height: 30px;
    opacity: 0.78;
  }
  .footer-logo .url {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--muted2);
    letter-spacing: 0.10em;
    padding-left: 14px;
    border-left: 1px solid rgba(77,114,255,0.20);
  }
  .cover-logo {
    height: 72px;
    width: auto;
    margin-bottom: 38px;
    opacity: 0.95;
    align-self: flex-start;
    flex-shrink: 0;
  }
  .cta-logo {
    height: 64px;
    width: auto;
    margin: 0 auto 24px;
    display: block;
    opacity: 0.95;
    align-self: center;
    flex-shrink: 0;
  }

  /* ===== Tag pills ===== */
  .tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--blue-bright);
    border: 1px solid var(--blue-border);
    background: var(--blue-dim);
    padding: 8px 18px;
    border-radius: 5px;
    margin-bottom: 28px;
  }
  .tag.red {
    color: var(--red);
    border-color: rgba(255,77,77,0.30);
    background: rgba(255,77,77,0.10);
  }
  .tag.gold {
    color: var(--amber);
    border-color: rgba(232,192,64,0.35);
    background: rgba(232,192,64,0.08);
  }
  .tag.green {
    color: var(--green);
    border-color: rgba(0,232,123,0.30);
    background: rgba(0,232,123,0.08);
  }

  /* ===== Typography ===== */
  .h1 {
    font-family: var(--display);
    font-weight: 700;
    color: var(--white);
    letter-spacing: -0.025em;
    line-height: 1.04;
  }
  .h2 {
    font-family: var(--display);
    font-weight: 600;
    color: var(--off-white);
    line-height: 1.15;
    letter-spacing: -0.015em;
  }
  .body-text {
    font-family: var(--body);
    color: var(--muted);
    line-height: 1.55;
  }
  .mono { font-family: var(--mono); }
  .blue-text   { color: var(--blue-bright); }
  .green-text  { color: var(--green); }
  .red-text    { color: var(--red); }
  .gold-text   { color: var(--amber); }
  .white-text  { color: var(--white); }
  .off-text    { color: var(--off-white); }
  .grad-blue {
    background: linear-gradient(90deg, var(--blue-bright), var(--blue-vivid));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .grad-bluegreen {
    background: linear-gradient(90deg, var(--blue-bright), var(--green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .grad-gold {
    background: linear-gradient(135deg, var(--amber) 30%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ===== Layout helpers ===== */
  .stage {
    position: relative;
    z-index: 2;
    padding: 80px 84px 0;
    height: 100%;
    display: flex;
    flex-direction: column;
  }
  .stage.center { justify-content: center; text-align: center; }
  .divider {
    width: 72px; height: 3px;
    background: var(--blue);
    margin: 24px 0;
    border-radius: 1px;
  }
  .divider.center { margin-left: auto; margin-right: auto; }
  .divider.gradient {
    background: linear-gradient(90deg, var(--blue-bright), var(--green));
    width: 110px;
  }

  /* ===== COVER slide ===== */
  .cover .stage { padding-top: 120px; }
  .cover .badge-line {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 36px;
  }
  .cover .badge-line .pulse {
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 16px rgba(255,77,77,0.9);
  }
  .cover .badge-line .label {
    font-family: var(--mono);
    font-size: 20px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--red);
  }
  .cover .title-block {
    font-family: var(--display);
    font-weight: 700;
    letter-spacing: -2px;
    line-height: 1.0;
    color: var(--white);
    font-size: 116px;
  }
  .cover .subtitle-row {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-top: 36px;
  }
  .cover .subtitle-row .rule {
    width: 56px; height: 3px;
    background: var(--red);
    border-radius: 1px;
    flex-shrink: 0;
  }
  .cover .subtitle-row .text {
    font-family: var(--body);
    font-size: 22px;
    color: var(--muted);
    line-height: 1.5;
  }
  .cover .subtitle-row .text .em {
    color: var(--off-white);
    font-weight: 500;
  }
  .cover .ghost-num {
    position: absolute;
    bottom: -50px; right: -20px;
    font-family: var(--mono);
    font-weight: 500;
    font-size: 320px;
    line-height: 1;
    letter-spacing: -6px;
    color: rgba(77,114,255,0.10);
    user-select: none;
    pointer-events: none;
    white-space: nowrap;
  }

  /* ===== STAT slide ===== */
  .stat .stage { padding-top: 100px; }
  .stat .headline {
    font-family: var(--display);
    font-weight: 600;
    font-size: 52px;
    line-height: 1.15;
    color: var(--off-white);
    margin-bottom: 28px;
  }
  .stat .value {
    font-family: var(--mono);
    font-weight: 500;
    font-size: 220px;
    line-height: 1;
    letter-spacing: -4px;
    text-shadow: 0 0 40px rgba(77,114,255,0.4);
  }
  .stat .change {
    margin-top: 20px;
    font-family: var(--mono);
    font-size: 36px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .stat .footnote {
    margin-top: 36px;
    font-family: var(--body);
    font-size: 24px;
    color: var(--muted);
    line-height: 1.5;
    max-width: 800px;
  }

  /* ===== LIST slide ===== */
  .list .stage { padding-top: 100px; }
  .list .items {
    margin-top: 36px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .list .row {
    display: flex;
    align-items: flex-start;
    gap: 22px;
    padding: 26px 28px;
    border-radius: 12px;
    background: rgba(77,114,255,0.07);
    border: 1px solid rgba(77,114,255,0.22);
    border-left: 4px solid var(--blue-bright);
  }
  .list .row .num {
    font-family: var(--mono);
    font-size: 36px;
    font-weight: 500;
    color: var(--blue-bright);
    min-width: 56px;
    line-height: 1;
  }
  .list .row .body-cell {
    flex: 1;
    color: var(--off-white);
    font-family: var(--body);
    font-size: 24px;
    font-weight: 400;
    line-height: 1.45;
  }

  /* ===== RANKING / DATA-CARD slide ===== */
  .ranking .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 36px;
  }
  .ranking .card {
    padding: 30px 28px;
    border-radius: 14px;
    background: rgba(77,114,255,0.07);
    border: 1px solid rgba(77,114,255,0.25);
  }
  .ranking .card.green {
    background: rgba(0,232,123,0.07);
    border-color: rgba(0,232,123,0.25);
  }
  .ranking .card.red {
    background: rgba(255,77,77,0.08);
    border-color: rgba(255,77,77,0.25);
  }
  .ranking .card.gold {
    background: rgba(232,192,64,0.07);
    border-color: rgba(232,192,64,0.28);
  }
  .ranking .card .label {
    font-family: var(--mono);
    font-size: 16px;
    color: var(--muted);
    letter-spacing: 0.10em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .ranking .card .num {
    font-family: var(--mono);
    font-size: 56px;
    font-weight: 500;
    line-height: 1;
    color: var(--blue-bright);
    letter-spacing: -1px;
  }
  .ranking .card.green .num { color: var(--green); }
  .ranking .card.red   .num { color: var(--red); }
  .ranking .card.gold  .num { color: var(--amber); }
  .ranking .card .sub {
    margin-top: 10px;
    font-family: var(--body);
    font-size: 18px;
    color: var(--muted);
    line-height: 1.4;
  }

  /* ===== TIP slide ===== */
  .tip .stage { padding-top: 100px; }
  .tip .body-block {
    margin-top: 24px;
    font-family: var(--body);
    font-size: 28px;
    color: var(--off-white);
    line-height: 1.5;
    max-width: 880px;
  }
  .tip .quote-box {
    margin-top: 36px;
    padding: 26px 28px;
    background: var(--blue-dim);
    border: 1px solid var(--blue-border);
    border-left: 4px solid var(--blue-bright);
    border-radius: 10px;
  }
  .tip .quote-box .text {
    font-family: var(--body);
    font-size: 24px;
    color: var(--blue-bright);
    font-weight: 600;
    line-height: 1.45;
  }
  .tip .signoff {
    margin-top: 28px;
    font-family: var(--mono);
    font-size: 20px;
    color: var(--muted2);
    letter-spacing: 0.06em;
  }

  /* ===== CTA slide (final) ===== */
  .cta .stage {
    padding-top: 100px;
    justify-content: flex-start;
  }
  .cta .pre-label {
    font-family: var(--mono);
    font-size: 18px;
    letter-spacing: 0.16em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 22px;
  }
  .cta .headline {
    font-family: var(--display);
    font-weight: 700;
    font-size: 76px;
    line-height: 1.05;
    letter-spacing: -1.5px;
    color: var(--white);
    margin-bottom: 8px;
  }
  .cta .headline-grad {
    font-family: var(--display);
    font-weight: 700;
    font-size: 76px;
    line-height: 1.05;
    letter-spacing: -1.5px;
    margin-bottom: 28px;
  }
  .cta .cta-card {
    position: relative;
    margin-top: 18px;
    padding: 44px 38px;
    background: linear-gradient(135deg, rgba(26,68,240,0.40), rgba(77,114,255,0.20));
    border: 1px solid rgba(77,114,255,0.45);
    border-radius: 18px;
    overflow: hidden;
  }
  .cta .cta-card .glow-inner {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 540px; height: 160px;
    background: radial-gradient(ellipse, rgba(77,114,255,0.40) 0%, transparent 70%);
    pointer-events: none;
  }
  .cta .cta-card .label {
    position: relative; z-index: 1;
    font-family: var(--mono);
    font-size: 18px;
    letter-spacing: 0.14em;
    color: var(--blue-bright);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .cta .cta-card .ask {
    position: relative; z-index: 1;
    font-family: var(--display);
    font-weight: 600;
    font-size: 38px;
    color: var(--white);
    line-height: 1.2;
    letter-spacing: -0.5px;
    margin-bottom: 18px;
  }
  .cta .cta-card .link {
    position: relative; z-index: 1;
    font-family: var(--mono);
    font-size: 22px;
    color: var(--off-white);
    word-break: break-all;
    background: rgba(0,0,0,0.35);
    padding: 14px 18px;
    border-radius: 8px;
    border: 1px solid rgba(77,114,255,0.30);
  }
  .cta .signoff {
    margin-top: 44px;
    padding-top: 28px;
    border-top: 1px solid rgba(77,114,255,0.18);
  }
  .cta .signoff .name {
    font-family: var(--display);
    font-weight: 600;
    font-size: 28px;
    color: var(--white);
    margin-bottom: 10px;
  }
  .cta .signoff .row {
    display: flex;
    gap: 24px;
    align-items: center;
    flex-wrap: wrap;
    font-family: var(--mono);
    font-size: 18px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }
  .cta .signoff .row .sep {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--muted2);
  }
  .cta .signoff .role {
    margin-top: 14px;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--muted2);
    letter-spacing: 0.10em;
  }

  /* ============================================================
   * v5 VISUAL ELEMENTS — Bloomberg-meets-Apple
   * Adds dataviz primitives so every slide carries a visual
   * signal: donut gauges, spark strips, tier bands, bar-race
   * rankings, glyph badges, terminal address bars.
   * ============================================================ */

  /* Donut gauge — purely decorative concentric ring SVG behind big values */
  .donut-gauge {
    position: absolute;
    pointer-events: none;
    opacity: 0.55;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }

  /* Stat slide — value+ring composition */
  .stat .stat-stage {
    position: relative;
    margin-top: 12px;
    height: 460px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
  }
  .stat .value-wrap {
    position: relative;
    display: inline-block;
    padding: 40px 60px;
  }
  .stat .stat-stage .value {
    position: relative;
    z-index: 2;
    font-size: 200px;
  }
  .stat .stat-stage .change {
    position: absolute;
    bottom: 20px;
    right: 24px;
    font-family: var(--mono);
    font-size: 30px;
    z-index: 3;
  }

  /* Tier band — LO / MED / HI / PEAK positioning indicator */
  .tier-band {
    margin-top: 10px;
    display: flex;
    gap: 6px;
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.12em;
  }
  .tier-band .seg {
    flex: 1;
    text-align: center;
    padding: 12px 6px;
    border: 1px solid rgba(77,114,255,0.18);
    background: rgba(77,114,255,0.04);
    color: var(--muted2);
    border-radius: 4px;
    text-transform: uppercase;
  }
  .tier-band .seg.active {
    background: rgba(77,114,255,0.16);
    color: var(--blue-bright);
    border-color: rgba(77,114,255,0.45);
    text-shadow: 0 0 12px rgba(77,114,255,0.6);
  }
  .tier-band .seg.active.gold {
    background: rgba(232,192,64,0.16);
    color: var(--amber);
    border-color: rgba(232,192,64,0.45);
    text-shadow: 0 0 12px rgba(232,192,64,0.6);
  }
  .tier-band .seg.active.green {
    background: rgba(0,232,123,0.14);
    color: var(--green);
    border-color: rgba(0,232,123,0.45);
    text-shadow: 0 0 12px rgba(0,232,123,0.6);
  }
  .tier-band .seg.active.red {
    background: rgba(255,77,77,0.14);
    color: var(--red);
    border-color: rgba(255,77,77,0.45);
    text-shadow: 0 0 12px rgba(255,77,77,0.6);
  }

  /* Spark strip — a row of mini bars used as visual rhythm decoration */
  .spark-strip {
    margin-top: 18px;
    display: flex;
    align-items: end;
    gap: 4px;
    height: 40px;
  }
  .spark-strip .bar {
    flex: 1;
    background: linear-gradient(to top, rgba(77,114,255,0.05), rgba(77,114,255,0.55));
    border-top: 1px solid rgba(77,114,255,0.7);
    border-radius: 2px 2px 0 0;
    min-height: 4px;
  }
  .spark-strip.green .bar {
    background: linear-gradient(to top, rgba(0,232,123,0.05), rgba(0,232,123,0.55));
    border-top-color: rgba(0,232,123,0.7);
  }
  .spark-strip.gold .bar {
    background: linear-gradient(to top, rgba(232,192,64,0.05), rgba(232,192,64,0.55));
    border-top-color: rgba(232,192,64,0.7);
  }
  .spark-strip.red .bar {
    background: linear-gradient(to top, rgba(255,77,77,0.05), rgba(255,77,77,0.55));
    border-top-color: rgba(255,77,77,0.7);
  }

  /* Data ribbon — terminal-style source/freshness attribution */
  .data-ribbon {
    margin-top: 22px;
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 10px 16px;
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(77,114,255,0.22);
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }
  .data-ribbon .pulse-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 10px rgba(0,232,123,0.8);
  }
  .data-ribbon .sep {
    width: 1px; height: 12px;
    background: rgba(77,114,255,0.30);
  }

  /* List v5 — circle number badge + glyph + body */
  .list-v5 .items {
    margin-top: 30px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .list-v5 .row {
    position: relative;
    display: flex;
    align-items: flex-start;
    gap: 20px;
    padding: 22px 26px;
    border-radius: 12px;
    background: rgba(77,114,255,0.05);
    border: 1px solid rgba(77,114,255,0.18);
    border-left: 4px solid var(--blue-bright);
  }
  .list-v5 .row.featured {
    background: rgba(77,114,255,0.10);
    border-color: rgba(77,114,255,0.35);
    box-shadow: 0 0 28px rgba(77,114,255,0.15);
  }
  .list-v5 .row .num-badge {
    flex-shrink: 0;
    width: 50px; height: 50px;
    border-radius: 50%;
    background: rgba(26,68,240,0.20);
    border: 1px solid rgba(77,114,255,0.45);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 500;
    color: var(--blue-bright);
    letter-spacing: -0.5px;
  }
  .list-v5 .row .row-glyph {
    flex-shrink: 0;
    width: 28px; height: 28px;
    margin-top: 10px;
    color: var(--blue-bright);
    opacity: 0.65;
  }
  .list-v5 .row .body-cell {
    flex: 1;
    color: var(--off-white);
    font-family: var(--body);
    font-size: 22px;
    font-weight: 400;
    line-height: 1.45;
  }

  /* Bar-race ranking — horizontal bars with rank, label, value */
  .bar-race {
    margin-top: 28px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .bar-race .bar-row {
    position: relative;
    display: grid;
    grid-template-columns: 56px minmax(220px, 290px) 1fr 130px;
    gap: 16px;
    align-items: center;
    padding: 16px 18px;
    background: rgba(77,114,255,0.05);
    border: 1px solid rgba(77,114,255,0.18);
    border-radius: 10px;
  }
  .bar-race .bar-row .rank {
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 500;
    color: var(--blue-bright);
  }
  .bar-race .bar-row .row-label {
    font-family: var(--display);
    font-size: 20px;
    font-weight: 600;
    color: var(--white);
    letter-spacing: -0.3px;
    line-height: 1.15;
  }
  .bar-race .bar-row .row-label .sub {
    display: block;
    font-family: var(--body);
    font-weight: 400;
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0;
    line-height: 1.35;
  }
  .bar-race .bar-row .bar-track {
    position: relative;
    height: 26px;
    background: rgba(0,0,0,0.30);
    border: 1px solid rgba(77,114,255,0.18);
    border-radius: 4px;
    overflow: hidden;
  }
  .bar-race .bar-row .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, rgba(77,114,255,0.9), rgba(77,114,255,0.5));
    box-shadow: inset 0 0 16px rgba(77,114,255,0.6);
  }
  .bar-race .bar-row .row-value {
    font-family: var(--mono);
    font-size: 24px;
    font-weight: 500;
    color: var(--blue-bright);
    text-align: right;
    letter-spacing: -0.5px;
  }
  .bar-race .bar-row.gold {
    border-color: rgba(232,192,64,0.40);
    background: rgba(232,192,64,0.06);
    box-shadow: 0 0 36px rgba(232,192,64,0.12);
  }
  .bar-race .bar-row.gold .rank,
  .bar-race .bar-row.gold .row-value { color: var(--amber); }
  .bar-race .bar-row.gold .bar-fill {
    background: linear-gradient(90deg, rgba(232,192,64,0.95), rgba(232,192,64,0.55));
    box-shadow: inset 0 0 18px rgba(232,192,64,0.6);
  }
  .bar-race .bar-row.green { border-color: rgba(0,232,123,0.30); background: rgba(0,232,123,0.05); }
  .bar-race .bar-row.green .rank,
  .bar-race .bar-row.green .row-value { color: var(--green); }
  .bar-race .bar-row.green .bar-fill {
    background: linear-gradient(90deg, rgba(0,232,123,0.85), rgba(0,232,123,0.45));
    box-shadow: inset 0 0 14px rgba(0,232,123,0.5);
  }
  .bar-race .bar-row.red { border-color: rgba(255,77,77,0.30); background: rgba(255,77,77,0.06); }
  .bar-race .bar-row.red .rank,
  .bar-race .bar-row.red .row-value { color: var(--red); }
  .bar-race .bar-row.red .bar-fill {
    background: linear-gradient(90deg, rgba(255,77,77,0.85), rgba(255,77,77,0.45));
    box-shadow: inset 0 0 14px rgba(255,77,77,0.5);
  }

  /* Tip v5 — lightbulb glyph + structured badge */
  .tip-v5 .badge-row {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
  }
  .tip-v5 .badge-row .tip-glyph {
    width: 38px; height: 38px;
    flex: 0 0 38px;
    color: var(--amber);
    filter: drop-shadow(0 0 10px rgba(232,192,64,0.45));
  }
  .tip-v5 .badge-row .tip-tag {
    font-family: var(--mono);
    font-size: 15px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--amber);
    border: 1px solid rgba(232,192,64,0.30);
    background: rgba(232,192,64,0.08);
    padding: 8px 16px;
    border-radius: 4px;
  }

  /* CTA v5 — terminal-style address bar inside the cta-card */
  .term-addr {
    margin-top: 18px;
    padding: 12px 16px;
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(77,114,255,0.30);
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 18px;
    color: var(--green);
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .term-addr .prompt { color: var(--blue-bright); }
  .term-addr .cursor {
    display: inline-block;
    width: 10px; height: 18px;
    background: var(--green);
    margin-left: 6px;
    box-shadow: 0 0 8px rgba(0,232,123,0.6);
  }

  /* Glyph base style — used everywhere */
  .glyph {
    display: inline-block;
    width: 18px;
    height: 18px;
    flex: 0 0 18px;
    vertical-align: -3px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .glyph.lg { width: 28px; height: 28px; flex-basis: 28px; vertical-align: -6px; }
  .glyph.xl { width: 44px; height: 44px; flex-basis: 44px; vertical-align: -10px; }

  /* ===== Overlay mode (text/UI on transparent bg, composited atop AI image) ===== */
  /* Applied to slide kinds: cover, stat, tip. Renderer emits a slide-N-overlay.png
     transparent screenshot, which slide-enhancer composites on top of the AI bg. */
  html.overlay-render,
  body.overlay-render { background: transparent !important; }
  .slide.overlay-mode {
    background: transparent !important;
  }
  .slide.overlay-mode .overlay-scrim {
    /* Diagonal dark scrim — heavier on the upper-left where headline sits,
       fading toward lower-right so the AI image breathes. */
    position: absolute; inset: 0;
    background:
      linear-gradient(135deg,
        rgba(3,7,26,0.88) 0%,
        rgba(3,7,26,0.72) 25%,
        rgba(3,7,26,0.45) 55%,
        rgba(3,7,26,0.10) 100%);
    pointer-events: none;
    z-index: 0;
  }
  /* Stat slide: scrim weighted center-left where the giant number sits. */
  .slide.stat.overlay-mode .overlay-scrim {
    background:
      linear-gradient(105deg,
        rgba(3,7,26,0.88) 0%,
        rgba(3,7,26,0.78) 35%,
        rgba(3,7,26,0.55) 65%,
        rgba(3,7,26,0.18) 100%);
  }
  /* Tip slide: even darker scrim because the punchline card needs maximum readability. */
  .slide.tip.overlay-mode .overlay-scrim {
    background:
      linear-gradient(180deg,
        rgba(3,7,26,0.88) 0%,
        rgba(3,7,26,0.82) 50%,
        rgba(3,7,26,0.78) 100%);
  }
  /* Lift text above the scrim — keep original positioning intact */
  .slide.overlay-mode .stage { z-index: 2; }
  .slide.overlay-mode .ghost-num { z-index: 2; }
  .slide.overlay-mode .top-strip,
  .slide.overlay-mode .bot-strip,
  .slide.overlay-mode .slide-num { z-index: 2; }
  /* Drop-shadow on key text so it survives any AI bg */
  .slide.cover.overlay-mode .title-block,
  .slide.cover.overlay-mode .badge-line,
  .slide.stat.overlay-mode .stat-headline,
  .slide.stat.overlay-mode .stat-value,
  .slide.tip.overlay-mode .tip-title,
  .slide.tip.overlay-mode .tip-body,
  .slide.tip.overlay-mode .tip-quote {
    text-shadow: 0 2px 24px rgba(0,0,0,0.75);
  }
</style>
</head>
<body>
<div id="root"></div>
<script>
  const payload = decodeURIComponent(location.hash.slice(1) || '%7B%7D');
  const data = JSON.parse(payload || '{}');
  const root = document.getElementById('root');
  // Overlay-render mode: transparent page bg so the cover slide composites over an AI image.
  // Must be a function so the hashchange listener can re-apply when nav goes
  // cover-normal → cover-overlay on the same page.
  function applyOverlayMode() {
    if (data._overlay) {
      document.documentElement.classList.add('overlay-render');
      document.body.classList.add('overlay-render');
      document.documentElement.style.background = 'transparent';
      document.body.style.background = 'transparent';
    } else {
      document.documentElement.classList.remove('overlay-render');
      document.body.classList.remove('overlay-render');
      document.documentElement.style.background = '';
      document.body.style.background = '';
    }
  }
  applyOverlayMode();
  // NB: idx/tot/drop are derived per-render from `data` so hashchange picks them up.
  function ctx() {
    return {
      drop: data._drop || {},
      idx:  data._index || 1,
      tot:  data._total || 1,
    };
  }

  const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  const CALENDLY_URL = 'https://meeting.povguy.sg';
  const SIGNOFF_NAME = 'Farhan Adenan';
  const SIGNOFF_PHONE = '+65 9236 1561';
  const SIGNOFF_SITE = 'POVGUY.SG';
  const SIGNOFF_ROLE = 'CEA R068636D · L3008022J';

  function chrome(opts = {}) {
    const { idx, tot } = ctx();
    const numText = String(idx).padStart(2,'0') + ' / ' + String(tot).padStart(2,'0');
    const wm = opts.hideWatermark ? '' :
      `<div class="footer-wm">povguy.sg</div>`;
    const footerLogo = opts.hideLogo ? '' : `
      <div class="footer-logo">
        <img class="brand-img" src="../assets/povguylogo-white-transparent.png" alt="POV Guy">
        <div class="url">POVGUY.SG</div>
      </div>`;
    return `
      <div class="slide-num">${numText}</div>
      ${wm}${footerLogo}
    `;
  }

  function dotPattern() {
    const { idx } = ctx();
    return `
    <svg class="dotgrid" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots-${idx}" x="0" y="0" width="44" height="44" patternUnits="userSpaceOnUse">
          <circle cx="3" cy="3" r="2.2" fill="#4D72FF"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#dots-${idx})"/>
    </svg>`;
  }

  function brandMarkRow(eyebrow) {
    return `
      <div class="brand-mark">
        <div class="dot"></div>
        <div class="name">POV GUY <span>·</span> REALTY INTEL</div>
        ${eyebrow ? `<div style="margin-left:16px;color:var(--muted2);">${esc(eyebrow)}</div>` : ''}
      </div>
    `;
  }

  /* ========== v5 dataviz helpers ========== */

  // Decorative concentric ring SVG (Bloomberg gauge feel) placed behind big values.
  function donutSvg(size, color) {
    const cx = size / 2, cy = size / 2;
    const arcs = [
      { r: cx - 8,  dash: '380 220', off: '0',   w: 2,   o: 0.85 },
      { r: cx - 30, dash: '180 480', off: '120', w: 1.5, o: 0.55 },
      { r: cx - 56, dash: '90 480',  off: '40',  w: 1,   o: 0.40 },
      { r: cx - 4,  dash: '4 22',    off: '0',   w: 1,   o: 0.30 },
    ];
    const ring = arcs.map(a =>
      `<circle cx="${cx}" cy="${cy}" r="${a.r}" fill="none" stroke="${color}" stroke-width="${a.w}" stroke-dasharray="${a.dash}" stroke-dashoffset="${a.off}" opacity="${a.o}"/>`
    ).join('');
    return `<svg class="donut-gauge" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">${ring}</svg>`;
  }

  // Spark-bar strip — pseudo-random heights derived from a deterministic sine pattern.
  // This is decoration, not data. Kept short enough to feel like a market ticker.
  function sparkBars(count, tone) {
    const bars = [];
    for (let i = 0; i < count; i++) {
      const h = 32 + Math.sin(i * 0.7 + count * 0.3) * 22 + Math.cos(i * 1.3) * 16;
      const pct = Math.max(10, Math.min(100, h));
      bars.push(`<div class="bar" style="height:${pct}%"></div>`);
    }
    return `<div class="spark-strip ${tone || ''}">${bars.join('')}</div>`;
  }

  // Tier band — labels [LO MED HI PEAK] with one segment lit. Driven by value_color.
  function tierBand(activeIdx, tone) {
    const tiers = ['LO', 'MED', 'HI', 'PEAK'];
    return `<div class="tier-band">${
      tiers.map((t, i) =>
        `<div class="seg ${i === activeIdx ? 'active ' + (tone || '') : ''}">${t}</div>`
      ).join('')
    }</div>`;
  }

  // Map value_color → tier index + tone class.
  // red = outlier/peak rent; gold = premium tier; green = value tier; default = mid.
  function tierFromColor(color) {
    if (color === 'red')   return { idx: 3, tone: 'red' };
    if (color === 'gold')  return { idx: 2, tone: 'gold' };
    if (color === 'green') return { idx: 1, tone: 'green' };
    return { idx: 1, tone: '' };
  }

  // Lucide-style stroked SVG icons. Each entry is the inner content of an SVG tag.
  const GLYPHS = {
    'chart-up':    '<polyline points="3 17 9 11 13 15 21 7"/><polyline points="14 7 21 7 21 14"/>',
    'scale':       '<path d="M16 16l-4-12-4 12z"/><path d="M3 6h18"/><path d="M5 9l-3 7h6z"/><path d="M19 9l-3 7h6z"/>',
    'building':    '<rect x="4" y="3" width="16" height="18" rx="1"/><line x1="9" y1="7" x2="11" y2="7"/><line x1="9" y1="11" x2="11" y2="11"/><line x1="9" y1="15" x2="11" y2="15"/><line x1="13" y1="7" x2="15" y2="7"/><line x1="13" y1="11" x2="15" y2="11"/><line x1="13" y1="15" x2="15" y2="15"/>',
    'tag':         '<path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><circle cx="7" cy="7" r="0.6"/>',
    'sparkles':    '<path d="M12 3l1.5 5L18 9.5 13.5 11 12 16l-1.5-5L6 9.5 10.5 8z"/><path d="M19 15l.7 2L21 17.7 19 18.4 18.3 20 17.6 18.4 16 17.7 17.6 17z"/>',
    'lightbulb':   '<path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7 4 4 0 0 1 1.5 3.3h5a4 4 0 0 1 1.5-3.3A7 7 0 0 0 12 2z"/>',
    'arrow-right': '<line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>',
    'calendar':    '<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',
  };
  function glyph(name, cls) {
    const inner = GLYPHS[name] || GLYPHS['arrow-right'];
    return `<svg class="glyph ${cls || ''}" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">${inner}</svg>`;
  }
  const ROW_GLYPHS = ['chart-up', 'scale', 'building', 'tag', 'sparkles'];

  // Extract a numeric value from "$3,900", "~$11,800", "5.5%" etc.
  function parseValueNumber(s) {
    const m = String(s || '').match(/[\d,.]+/);
    if (!m) return 0;
    return parseFloat(m[0].replace(/,/g, '')) || 0;
  }

  // Map value_color → CSS hex (used for donut stroke).
  function colorHex(c) {
    if (c === 'gold')  return '#E8C040';
    if (c === 'red')   return '#FF4D4D';
    if (c === 'green') return '#00E87B';
    return '#4D72FF';
  }

  // "LIVE · TAG · SOURCE" terminal-style metadata strip
  function dataRibbon(label, source) {
    return `<div class="data-ribbon">
      <div class="pulse-dot"></div>
      <span>LIVE</span>
      ${label ? `<div class="sep"></div><span>${esc(label)}</span>` : ''}
      ${source ? `<div class="sep"></div><span>${esc(source)}</span>` : ''}
    </div>`;
  }

  function render() {
    const k = data.kind || 'cover';
    let html = '';

    if (k === 'cover') {
      const { drop } = ctx();
      const ghost = (data.ghost_number || '').toString();
      const badge = data.badge || drop.theme || 'Daily Drop';
      const overlayMode = !!data._overlay;
      // Overlay mode: transparent bg + scrim behind text for legibility over AI image.
      // Decorative elements (glows, dot pattern) suppressed; ghost-number + chrome kept.
      html = `
        <div class="slide cover ${overlayMode ? 'overlay-mode' : ''}">
          ${overlayMode ? '<div class="overlay-scrim"></div>' : `
          <div class="top-accent"></div>
          <div class="glow blue-cr"></div>
          <div class="glow red-tl"></div>
          ${dotPattern()}`}
          ${ghost ? `<div class="ghost-num">${esc(ghost)}</div>` : ''}
          ${chrome()}
          <div class="stage">
            <img class="cover-logo" src="../assets/povguylogo-white-transparent.png" alt="POV Guy Realtor">
            <div class="badge-line">
              <div class="pulse"></div>
              <div class="label">${esc(badge)}</div>
            </div>
            <div class="title-block">${esc(data.title || '')}</div>
            <div class="subtitle-row">
              <div class="rule"></div>
              <div class="text">${esc(data.subtitle || '')}</div>
            </div>
          </div>
        </div>`;
    }

    else if (k === 'stat') {
      const change = data.change || '';
      const dir = change.toString().trim().startsWith('-') ? 'red-text' :
                  change.toString().trim().startsWith('+') ? 'green-text' : 'blue-text';
      const colorKey = data.value_color || 'blue';
      const valueColor = colorKey === 'green' ? 'green-text' :
                         colorKey === 'red'   ? 'red-text' :
                         colorKey === 'gold'  ? 'gold-text' : 'grad-blue';
      const tier = tierFromColor(colorKey);
      const sparkTone = colorKey === 'gold' ? 'gold' :
                        colorKey === 'red'  ? 'red'  :
                        colorKey === 'green' ? 'green' : '';
      html = `
        <div class="slide stat bg2 ${overlayMode ? 'overlay-mode' : ''}">
          ${overlayMode ? '<div class="overlay-scrim"></div>' : `
          <div class="glow blue-cr"></div>
          <div class="glow red-tl"></div>
          `}
          ${chrome()}
          <div class="stage">
            ${data.tag ? `<div class="tag">${esc(data.tag)}</div>` : ''}
            <div class="headline stat-headline">${esc(data.headline || '')}</div>
            <div class="stat-stage">
              <div class="value-wrap">
                ${donutSvg(460, colorHex(colorKey))}
                <div class="value stat-value ${valueColor}">${esc(data.value || '')}</div>
                ${change ? `<div class="change ${dir}">${esc(change)}</div>` : ''}
              </div>
            </div>
            ${tierBand(tier.idx, tier.tone)}
            ${sparkBars(28, sparkTone)}
            <div class="footnote">${esc(data.footnote || '')}</div>
          </div>
        </div>`;
    }

    else if (k === 'list') {
      const itemsRaw = (data.items || []);
      const items = itemsRaw.map((it, i) => {
        const text = typeof it === 'string' ? it : (it.text || it.body || JSON.stringify(it));
        const num = String(i + 1).padStart(2, '0');
        const g = ROW_GLYPHS[i % ROW_GLYPHS.length];
        const featured = i === 0 ? 'featured' : '';
        return `
          <div class="row ${featured}">
            <div class="num-badge">${num}</div>
            ${glyph(g, 'row-glyph')}
            <div class="body-cell">${esc(text)}</div>
          </div>`;
      }).join('');
      html = `
        <div class="slide list list-v5 bg3">
          <div class="glow blue-cr"></div>
          ${chrome()}
          <div class="stage">
            ${data.tag ? `<div class="tag">${esc(data.tag)}</div>` : ''}
            <div class="h2" style="font-size:54px;">${esc(data.title || '')}</div>
            <div class="divider"></div>
            <div class="items">${items}</div>
          </div>
        </div>`;
    }

    else if (k === 'ranking' || k === 'cards' || k === 'chart') {
      const items = (data.items || data.cards || []);
      // Compute bar widths from numeric portion of each value, normalized to the max.
      const numbers = items.map(it => parseValueNumber(it.value));
      const maxNum = Math.max(1, ...numbers);
      const rows = items.map((it, i) => {
        const tone = it.tone || 'blue';
        const toneClass = tone === 'green' ? 'green' : tone === 'red' ? 'red' : tone === 'gold' ? 'gold' : '';
        const widthPct = Math.max(8, (numbers[i] / maxNum) * 100);
        const rank = String(i + 1).padStart(2, '0');
        return `
          <div class="bar-row ${toneClass}">
            <div class="rank">${rank}.</div>
            <div class="row-label">
              ${esc(it.label || '')}
              ${it.sub ? `<span class="sub">${esc(it.sub)}</span>` : ''}
            </div>
            <div class="bar-track">
              <div class="bar-fill" style="width:${widthPct.toFixed(1)}%"></div>
            </div>
            <div class="row-value">${esc(it.value || '')}</div>
          </div>`;
      }).join('');
      html = `
        <div class="slide ranking bg2">
          <div class="glow gold-tr"></div>
          <div class="glow blue-bl"></div>
          ${chrome()}
          <div class="stage">
            ${data.tag ? `<div class="tag">${esc(data.tag)}</div>` : ''}
            <div class="h2" style="font-size:50px;">${esc(data.title || '')}</div>
            <div class="divider gradient"></div>
            <div class="bar-race">${rows}</div>
            ${data.footnote ? `<div class="footnote mono" style="margin-top:22px;font-size:16px;color:var(--muted2);line-height:1.5;">${esc(data.footnote)}</div>` : ''}
          </div>
        </div>`;
    }

    else if (k === 'tip') {
      html = `
        <div class="slide tip tip-v5 bg3 ${overlayMode ? 'overlay-mode' : ''}">
          ${overlayMode ? '<div class="overlay-scrim"></div>' : `
          <div class="glow gold-tr"></div>
          <div class="glow blue-cr"></div>
          `}
          ${chrome()}
          <div class="stage">
            <div class="badge-row">
              ${glyph('lightbulb', 'tip-glyph')}
              <div class="tip-tag">${esc(data.tag || 'POV Guy Tip')}</div>
            </div>
            <div class="h2 tip-title" style="font-size:62px;">${esc(data.title || '')}</div>
            <div class="divider"></div>
            <div class="body-block tip-body">${esc(data.body || '')}</div>
            ${data.quote ? `<div class="quote-box"><div class="text tip-quote">${esc(data.quote)}</div></div>` : ''}
            <div class="signoff">— ${esc(data.signoff || 'Farhan Adenan')}</div>
          </div>
        </div>`;
    }

    else if (k === 'cta') {
      const headlineTop = data.title || 'Ready to make your next move?';
      const headlineGrad = data.title_accent || 'Let\u2019s strategise.';
      const ask = data.primary_cta || 'Book a 30-min strategy call';
      html = `
        <div class="slide cta">
          <div class="top-accent gold"></div>
          <div class="glow center"></div>
          ${dotPattern()}
          <div style="position:absolute;bottom:0;left:0;right:0;height:200px;
            background:linear-gradient(to top,var(--bg) 0%,transparent 100%);
            pointer-events:none;"></div>
          ${chrome({ hideWatermark: true, hideLogo: true })}
          <div class="stage">
            <img class="cta-logo" src="../assets/povguylogo-white-transparent.png" alt="POV Guy Realtor">
            <div class="pre-label">Next Step</div>
            <div class="headline">${esc(headlineTop)}</div>
            <div class="headline-grad grad-bluegreen">${esc(headlineGrad)}</div>
            <div class="divider gradient"></div>
            <div class="cta-card">
              <div class="glow-inner"></div>
              <div class="label">${glyph('calendar')} &nbsp;Book a 30-min slot</div>
              <div class="ask">${esc(ask)}</div>
              <div class="term-addr">
                <span class="prompt">&gt;_</span>
                <span>${esc(CALENDLY_URL)}</span>
                <span class="cursor"></span>
              </div>
            </div>
            <div class="signoff">
              <div class="name">${esc(SIGNOFF_NAME)}</div>
              <div class="row">
                <div>${esc(SIGNOFF_PHONE)}</div>
                <div class="sep"></div>
                <div>${esc(SIGNOFF_SITE)}</div>
              </div>
              <div class="role">${esc(SIGNOFF_ROLE)}</div>
            </div>
          </div>
        </div>`;
    }

    else {
      html = `
        <div class="slide bg2">
          <div class="glow blue-cr"></div>
          ${chrome()}
          <div class="stage">
            <div class="h1" style="font-size:64px;">${esc(data.title || 'Untitled')}</div>
          </div>
        </div>`;
    }

    root.innerHTML = html;
  }
  // Re-render whenever the URL hash changes. The renderer navigates via
  // page.goto(template#payload) for each slide; without a hashchange listener,
  // only the first render fires and every screenshot returns the cover slide.
  function rerenderFromHash() {
    try {
      const next = JSON.parse(decodeURIComponent(location.hash.slice(1) || '%7B%7D'));
      Object.keys(data).forEach(k => delete data[k]);
      Object.assign(data, next);
      applyOverlayMode();
      render();
    } catch (e) {
      console.error('hashchange parse failed', e);
    }
  }
  window.addEventListener('hashchange', rerenderFromHash);
  render();
</script>
</body>
</html>
