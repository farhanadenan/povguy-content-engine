<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>POV Guy Carousel Slide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ===== POV GUY DESIGN SYSTEM (v4 — Glassmorphism vibe, scaled for 1080x1350) ===== */
  :root {
    --blue:        #1A44F0;
    --blue-vivid:  #2C55F5;
    --blue-bright: #4D72FF;
    --blue-dim:    rgba(26,68,240,0.12);
    --blue-border: rgba(77,114,255,0.20);
    --bg:   #03071A;
    --bg2:  #060C24;
    --bg3:  #0A1232;
    --white:     #FFFFFF;
    --off-white: #E8EEFF;
    --muted:     #6B82C0;
    --muted2:    #3D5090;
    --green: #00E87B;
    --red:   #FF4D4D;
    --amber: #E8C040;
    --gold:  #C9A84C;
    --mono:    'IBM Plex Mono', monospace;
    --display: 'Space Grotesk', sans-serif;
    --body:    'Inter', sans-serif;
    --slide-w: 1080px;
    --slide-h: 1350px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: var(--slide-w);
    height: var(--slide-h);
    overflow: hidden;
    background: #000;
    font-family: var(--body);
    color: var(--white);
    -webkit-font-smoothing: antialiased;
  }

  /* ===== Base slide canvas ===== */
  .slide {
    position: relative;
    width: var(--slide-w);
    height: var(--slide-h);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: var(--bg);
  }
  .slide.bg2 { background: var(--bg2); }
  .slide.bg3 { background: var(--bg3); }

  /* ===== Background decoration layers (purely decorative) ===== */
  .glow {
    position: absolute;
    pointer-events: none;
    border-radius: 50%;
  }
  .glow.blue-cr {
    top: 18%; right: -160px;
    width: 840px; height: 840px;
    background: radial-gradient(ellipse, rgba(26,68,240,0.36) 0%, rgba(26,68,240,0.08) 45%, transparent 70%);
  }
  .glow.red-tl {
    top: -80px; left: -80px;
    width: 480px; height: 480px;
    background: radial-gradient(ellipse, rgba(255,77,77,0.16) 0%, transparent 65%);
  }
  .glow.gold-tr {
    top: -80px; right: -80px;
    width: 440px; height: 440px;
    background: radial-gradient(circle, rgba(232,192,64,0.18) 0%, transparent 65%);
  }
  .glow.blue-bl {
    bottom: -80px; left: -80px;
    width: 360px; height: 360px;
    background: radial-gradient(circle, rgba(26,68,240,0.20) 0%, transparent 65%);
  }
  .glow.center {
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 1000px; height: 1000px;
    background: radial-gradient(ellipse, rgba(26,68,240,0.30) 0%, rgba(26,68,240,0.08) 40%, transparent 70%);
  }
  .dotgrid {
    position: absolute; inset: 0;
    opacity: 0.07;
    pointer-events: none;
  }
  .top-accent {
    position: absolute; top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--red) 0%, var(--blue-bright) 60%, transparent 100%);
  }
  .top-accent.gold {
    background: linear-gradient(90deg, transparent, var(--amber), var(--green), transparent);
  }

  /* ===== Chrome (slide num, brand mark, watermark) ===== */
  .slide-num {
    position: absolute;
    top: 40px; right: 44px;
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 400;
    color: var(--muted2);
    letter-spacing: 0.05em;
    z-index: 5;
  }
  .brand-mark {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-family: var(--mono);
    font-size: 16px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .brand-mark .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--blue-bright);
    box-shadow: 0 0 12px rgba(77,114,255,0.9);
  }
  .brand-mark .name { color: var(--off-white); font-weight: 500; }
  .brand-mark .name span { color: var(--blue-bright); }

  .footer-wm {
    position: absolute;
    bottom: 36px; right: 44px;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--muted2);
    letter-spacing: 0.08em;
    z-index: 5;
  }
  .footer-wm.left {
    right: auto;
    left: 44px;
  }

  /* ===== Brand logo (chrome footer + featured placements) ===== */
  .brand-img {
    height: 28px;
    width: auto;
    opacity: 0.85;
    display: block;
  }
  .footer-logo {
    position: absolute;
    bottom: 32px; left: 44px;
    z-index: 5;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .footer-logo .brand-img {
    height: 30px;
    opacity: 0.78;
  }
  .footer-logo .url {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--muted2);
    letter-spacing: 0.10em;
    padding-left: 14px;
    border-left: 1px solid rgba(77,114,255,0.20);
  }
  .cover-logo {
    height: 72px;
    width: auto;
    margin-bottom: 38px;
    opacity: 0.95;
  }
  .cta-logo {
    height: 64px;
    width: auto;
    margin: 0 auto 24px;
    display: block;
    opacity: 0.95;
  }

  /* ===== Tag pills ===== */
  .tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--blue-bright);
    border: 1px solid var(--blue-border);
    background: var(--blue-dim);
    padding: 8px 18px;
    border-radius: 5px;
    margin-bottom: 28px;
  }
  .tag.red {
    color: var(--red);
    border-color: rgba(255,77,77,0.30);
    background: rgba(255,77,77,0.10);
  }
  .tag.gold {
    color: var(--amber);
    border-color: rgba(232,192,64,0.35);
    background: rgba(232,192,64,0.08);
  }
  .tag.green {
    color: var(--green);
    border-color: rgba(0,232,123,0.30);
    background: rgba(0,232,123,0.08);
  }

  /* ===== Typography ===== */
  .h1 {
    font-family: var(--display);
    font-weight: 700;
    color: var(--white);
    letter-spacing: -0.025em;
    line-height: 1.04;
  }
  .h2 {
    font-family: var(--display);
    font-weight: 600;
    color: var(--off-white);
    line-height: 1.15;
    letter-spacing: -0.015em;
  }
  .body-text {
    font-family: var(--body);
    color: var(--muted);
    line-height: 1.55;
  }
  .mono { font-family: var(--mono); }
  .blue-text   { color: var(--blue-bright); }
  .green-text  { color: var(--green); }
  .red-text    { color: var(--red); }
  .gold-text   { color: var(--amber); }
  .white-text  { color: var(--white); }
  .off-text    { color: var(--off-white); }
  .grad-blue {
    background: linear-gradient(90deg, var(--blue-bright), var(--blue-vivid));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .grad-bluegreen {
    background: linear-gradient(90deg, var(--blue-bright), var(--green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .grad-gold {
    background: linear-gradient(135deg, var(--amber) 30%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ===== Layout helpers ===== */
  .stage {
    position: relative;
    z-index: 2;
    padding: 80px 84px 0;
    height: 100%;
    display: flex;
    flex-direction: column;
  }
  .stage.center { justify-content: center; text-align: center; }
  .divider {
    width: 72px; height: 3px;
    background: var(--blue);
    margin: 24px 0;
    border-radius: 1px;
  }
  .divider.center { margin-left: auto; margin-right: auto; }
  .divider.gradient {
    background: linear-gradient(90deg, var(--blue-bright), var(--green));
    width: 110px;
  }

  /* ===== COVER slide ===== */
  .cover .stage { padding-top: 120px; }
  .cover .badge-line {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 36px;
  }
  .cover .badge-line .pulse {
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 16px rgba(255,77,77,0.9);
  }
  .cover .badge-line .label {
    font-family: var(--mono);
    font-size: 20px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--red);
  }
  .cover .title-block {
    font-family: var(--display);
    font-weight: 700;
    letter-spacing: -2px;
    line-height: 1.0;
    color: var(--white);
    font-size: 116px;
  }
  .cover .subtitle-row {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-top: 36px;
  }
  .cover .subtitle-row .rule {
    width: 56px; height: 3px;
    background: var(--red);
    border-radius: 1px;
    flex-shrink: 0;
  }
  .cover .subtitle-row .text {
    font-family: var(--body);
    font-size: 22px;
    color: var(--muted);
    line-height: 1.5;
  }
  .cover .subtitle-row .text .em {
    color: var(--off-white);
    font-weight: 500;
  }
  .cover .ghost-num {
    position: absolute;
    bottom: -50px; right: -20px;
    font-family: var(--mono);
    font-weight: 500;
    font-size: 320px;
    line-height: 1;
    letter-spacing: -6px;
    color: rgba(77,114,255,0.10);
    user-select: none;
    pointer-events: none;
    white-space: nowrap;
  }

  /* ===== STAT slide ===== */
  .stat .stage { padding-top: 100px; }
  .stat .headline {
    font-family: var(--display);
    font-weight: 600;
    font-size: 52px;
    line-height: 1.15;
    color: var(--off-white);
    margin-bottom: 28px;
  }
  .stat .value {
    font-family: var(--mono);
    font-weight: 500;
    font-size: 220px;
    line-height: 1;
    letter-spacing: -4px;
    text-shadow: 0 0 40px rgba(77,114,255,0.4);
  }
  .stat .change {
    margin-top: 20px;
    font-family: var(--mono);
    font-size: 36px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .stat .footnote {
    margin-top: 36px;
    font-family: var(--body);
    font-size: 24px;
    color: var(--muted);
    line-height: 1.5;
    max-width: 800px;
  }

  /* ===== LIST slide ===== */
  .list .stage { padding-top: 100px; }
  .list .items {
    margin-top: 36px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .list .row {
    display: flex;
    align-items: flex-start;
    gap: 22px;
    padding: 26px 28px;
    border-radius: 12px;
    background: rgba(77,114,255,0.07);
    border: 1px solid rgba(77,114,255,0.22);
    border-left: 4px solid var(--blue-bright);
  }
  .list .row .num {
    font-family: var(--mono);
    font-size: 36px;
    font-weight: 500;
    color: var(--blue-bright);
    min-width: 56px;
    line-height: 1;
  }
  .list .row .body-cell {
    flex: 1;
    color: var(--off-white);
    font-family: var(--body);
    font-size: 24px;
    font-weight: 400;
    line-height: 1.45;
  }

  /* ===== RANKING / DATA-CARD slide ===== */
  .ranking .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 36px;
  }
  .ranking .card {
    padding: 30px 28px;
    border-radius: 14px;
    background: rgba(77,114,255,0.07);
    border: 1px solid rgba(77,114,255,0.25);
  }
  .ranking .card.green {
    background: rgba(0,232,123,0.07);
    border-color: rgba(0,232,123,0.25);
  }
  .ranking .card.red {
    background: rgba(255,77,77,0.08);
    border-color: rgba(255,77,77,0.25);
  }
  .ranking .card.gold {
    background: rgba(232,192,64,0.07);
    border-color: rgba(232,192,64,0.28);
  }
  .ranking .card .label {
    font-family: var(--mono);
    font-size: 16px;
    color: var(--muted);
    letter-spacing: 0.10em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .ranking .card .num {
    font-family: var(--mono);
    font-size: 56px;
    font-weight: 500;
    line-height: 1;
    color: var(--blue-bright);
    letter-spacing: -1px;
  }
  .ranking .card.green .num { color: var(--green); }
  .ranking .card.red   .num { color: var(--red); }
  .ranking .card.gold  .num { color: var(--amber); }
  .ranking .card .sub {
    margin-top: 10px;
    font-family: var(--body);
    font-size: 18px;
    color: var(--muted);
    line-height: 1.4;
  }

  /* ===== TIP slide ===== */
  .tip .stage { padding-top: 100px; }
  .tip .body-block {
    margin-top: 24px;
    font-family: var(--body);
    font-size: 28px;
    color: var(--off-white);
    line-height: 1.5;
    max-width: 880px;
  }
  .tip .quote-box {
    margin-top: 36px;
    padding: 26px 28px;
    background: var(--blue-dim);
    border: 1px solid var(--blue-border);
    border-left: 4px solid var(--blue-bright);
    border-radius: 10px;
  }
  .tip .quote-box .text {
    font-family: var(--body);
    font-size: 24px;
    color: var(--blue-bright);
    font-weight: 600;
    line-height: 1.45;
  }
  .tip .signoff {
    margin-top: 28px;
    font-family: var(--mono);
    font-size: 20px;
    color: var(--muted2);
    letter-spacing: 0.06em;
  }

  /* ===== CTA slide (final) ===== */
  .cta .stage {
    padding-top: 100px;
    justify-content: flex-start;
  }
  .cta .pre-label {
    font-family: var(--mono);
    font-size: 18px;
    letter-spacing: 0.16em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 22px;
  }
  .cta .headline {
    font-family: var(--display);
    font-weight: 700;
    font-size: 76px;
    line-height: 1.05;
    letter-spacing: -1.5px;
    color: var(--white);
    margin-bottom: 8px;
  }
  .cta .headline-grad {
    font-family: var(--display);
    font-weight: 700;
    font-size: 76px;
    line-height: 1.05;
    letter-spacing: -1.5px;
    margin-bottom: 28px;
  }
  .cta .cta-card {
    position: relative;
    margin-top: 18px;
    padding: 44px 38px;
    background: linear-gradient(135deg, rgba(26,68,240,0.40), rgba(77,114,255,0.20));
    border: 1px solid rgba(77,114,255,0.45);
    border-radius: 18px;
    overflow: hidden;
  }
  .cta .cta-card .glow-inner {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 540px; height: 160px;
    background: radial-gradient(ellipse, rgba(77,114,255,0.40) 0%, transparent 70%);
    pointer-events: none;
  }
  .cta .cta-card .label {
    position: relative; z-index: 1;
    font-family: var(--mono);
    font-size: 18px;
    letter-spacing: 0.14em;
    color: var(--blue-bright);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .cta .cta-card .ask {
    position: relative; z-index: 1;
    font-family: var(--display);
    font-weight: 600;
    font-size: 38px;
    color: var(--white);
    line-height: 1.2;
    letter-spacing: -0.5px;
    margin-bottom: 18px;
  }
  .cta .cta-card .link {
    position: relative; z-index: 1;
    font-family: var(--mono);
    font-size: 22px;
    color: var(--off-white);
    word-break: break-all;
    background: rgba(0,0,0,0.35);
    padding: 14px 18px;
    border-radius: 8px;
    border: 1px solid rgba(77,114,255,0.30);
  }
  .cta .signoff {
    margin-top: 44px;
    padding-top: 28px;
    border-top: 1px solid rgba(77,114,255,0.18);
  }
  .cta .signoff .name {
    font-family: var(--display);
    font-weight: 600;
    font-size: 28px;
    color: var(--white);
    margin-bottom: 10px;
  }
  .cta .signoff .row {
    display: flex;
    gap: 24px;
    align-items: center;
    flex-wrap: wrap;
    font-family: var(--mono);
    font-size: 18px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }
  .cta .signoff .row .sep {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--muted2);
  }
  .cta .signoff .role {
    margin-top: 14px;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--muted2);
    letter-spacing: 0.10em;
  }
</style>
</head>
<body>
<div id="root"></div>
<script>
  const payload = decodeURIComponent(location.hash.slice(1) || '%7B%7D');
  const data = JSON.parse(payload || '{}');
  const root = document.getElementById('root');
  const drop = data._drop || {};
  const idx  = data._index || 1;
  const tot  = data._total || 1;

  const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  const CALENDLY_URL = 'https://calendly.com/farhan-adenan/30min';
  const SIGNOFF_NAME = 'Farhan Adenan';
  const SIGNOFF_PHONE = '+65 9236 1561';
  const SIGNOFF_SITE = 'POVGUY.SG';
  const SIGNOFF_ROLE = 'CEA R068636D · L3008022J';

  function chrome(opts = {}) {
    const numText = String(idx).padStart(2,'0') + ' / ' + String(tot).padStart(2,'0');
    const wm = opts.hideWatermark ? '' :
      `<div class="footer-wm">povguy.sg</div>`;
    const footerLogo = opts.hideLogo ? '' : `
      <div class="footer-logo">
        <img class="brand-img" src="../assets/povguylogo-white-transparent.png" alt="POV Guy">
        <div class="url">POVGUY.SG</div>
      </div>`;
    return `
      <div class="slide-num">${numText}</div>
      ${wm}${footerLogo}
    `;
  }

  function dotPattern() {
    return `
    <svg class="dotgrid" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots-${idx}" x="0" y="0" width="44" height="44" patternUnits="userSpaceOnUse">
          <circle cx="3" cy="3" r="2.2" fill="#4D72FF"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#dots-${idx})"/>
    </svg>`;
  }

  function brandMarkRow(eyebrow) {
    return `
      <div class="brand-mark">
        <div class="dot"></div>
        <div class="name">POV GUY <span>·</span> REALTY INTEL</div>
        ${eyebrow ? `<div style="margin-left:16px;color:var(--muted2);">${esc(eyebrow)}</div>` : ''}
      </div>
    `;
  }

  function render() {
    const k = data.kind || 'cover';
    let html = '';

    if (k === 'cover') {
      const ghost = (data.ghost_number || '').toString();
      const badge = data.badge || drop.theme || 'Daily Drop';
      html = `
        <div class="slide cover">
          <div class="top-accent"></div>
          <div class="glow blue-cr"></div>
          <div class="glow red-tl"></div>
          ${dotPattern()}
          ${ghost ? `<div class="ghost-num">${esc(ghost)}</div>` : ''}
          ${chrome()}
          <div class="stage">
            <img class="cover-logo" src="../assets/povguylogo-white-transparent.png" alt="POV Guy Realtor">
            <div class="badge-line">
              <div class="pulse"></div>
              <div class="label">${esc(badge)}</div>
            </div>
            <div class="title-block">${esc(data.title || '')}</div>
            <div class="subtitle-row">
              <div class="rule"></div>
              <div class="text">${esc(data.subtitle || '')}</div>
            </div>
          </div>
        </div>`;
    }

    else if (k === 'stat') {
      const change = data.change || '';
      const dir = change.toString().trim().startsWith('-') ? 'red-text' :
                  change.toString().trim().startsWith('+') ? 'green-text' : 'blue-text';
      const valueColor = data.value_color === 'green' ? 'green-text' :
                         data.value_color === 'red'   ? 'red-text' :
                         data.value_color === 'gold'  ? 'gold-text' : 'grad-blue';
      html = `
        <div class="slide stat bg2">
          <div class="glow blue-cr"></div>
          ${chrome()}
          <div class="stage">
            ${data.tag ? `<div class="tag">${esc(data.tag)}</div>` : ''}
            <div class="headline">${esc(data.headline || '')}</div>
            <div class="value ${valueColor}">${esc(data.value || '')}</div>
            <div class="change ${dir}">${esc(change)}</div>
            <div class="footnote">${esc(data.footnote || '')}</div>
          </div>
        </div>`;
    }

    else if (k === 'list') {
      const items = (data.items || []).map((it, i) => {
        const text = typeof it === 'string' ? it : (it.text || it.body || JSON.stringify(it));
        const num = String(i + 1).padStart(2, '0');
        return `
          <div class="row">
            <div class="num">${num}</div>
            <div class="body-cell">${esc(text)}</div>
          </div>`;
      }).join('');
      html = `
        <div class="slide list bg3">
          <div class="glow blue-cr"></div>
          ${chrome()}
          <div class="stage">
            ${data.tag ? `<div class="tag">${esc(data.tag)}</div>` : ''}
            <div class="h2" style="font-size:54px;">${esc(data.title || '')}</div>
            <div class="divider"></div>
            <div class="items">${items}</div>
          </div>
        </div>`;
    }

    else if (k === 'ranking' || k === 'cards' || k === 'chart') {
      const cards = (data.items || data.cards || []).map(it => {
        const tone = it.tone || 'blue';
        const toneClass = tone === 'green' ? 'green' : tone === 'red' ? 'red' : tone === 'gold' ? 'gold' : '';
        return `
          <div class="card ${toneClass}">
            <div class="label">${esc(it.label || '')}</div>
            <div class="num">${esc(it.value || '')}</div>
            <div class="sub">${esc(it.sub || '')}</div>
          </div>`;
      }).join('');
      html = `
        <div class="slide ranking bg2">
          <div class="glow gold-tr"></div>
          <div class="glow blue-bl"></div>
          ${chrome()}
          <div class="stage">
            ${data.tag ? `<div class="tag">${esc(data.tag)}</div>` : ''}
            <div class="h2" style="font-size:50px;">${esc(data.title || '')}</div>
            <div class="divider gradient"></div>
            <div class="grid">${cards}</div>
            ${data.footnote ? `<div class="footnote mono" style="margin-top:24px;font-size:18px;color:var(--muted2);">${esc(data.footnote)}</div>` : ''}
          </div>
        </div>`;
    }

    else if (k === 'tip') {
      html = `
        <div class="slide tip bg3">
          <div class="glow blue-cr"></div>
          ${chrome()}
          <div class="stage">
            <div class="tag gold">${esc(data.tag || 'POV Guy Tip')}</div>
            <div class="h2" style="font-size:62px;">${esc(data.title || '')}</div>
            <div class="divider"></div>
            <div class="body-block">${esc(data.body || '')}</div>
            ${data.quote ? `<div class="quote-box"><div class="text">${esc(data.quote)}</div></div>` : ''}
            <div class="signoff">— ${esc(data.signoff || 'Farhan Adenan')}</div>
          </div>
        </div>`;
    }

    else if (k === 'cta') {
      const headlineTop = data.title || 'Ready to make your next move?';
      const headlineGrad = data.title_accent || 'Let\u2019s strategise.';
      const ask = data.primary_cta || 'Book a 30-min strategy call';
      html = `
        <div class="slide cta">
          <div class="top-accent gold"></div>
          <div class="glow center"></div>
          ${dotPattern()}
          <div style="position:absolute;bottom:0;left:0;right:0;height:200px;
            background:linear-gradient(to top,var(--bg) 0%,transparent 100%);
            pointer-events:none;"></div>
          ${chrome({ hideWatermark: true, hideLogo: true })}
          <div class="stage">
            <img class="cta-logo" src="../assets/povguylogo-white-transparent.png" alt="POV Guy Realtor">
            <div class="pre-label">Next Step</div>
            <div class="headline">${esc(headlineTop)}</div>
            <div class="headline-grad grad-bluegreen">${esc(headlineGrad)}</div>
            <div class="divider gradient"></div>
            <div class="cta-card">
              <div class="glow-inner"></div>
              <div class="label">Book a 30-min strategy call</div>
              <div class="ask">${esc(ask)}</div>
              <div class="link">${esc(CALENDLY_URL)}</div>
            </div>
            <div class="signoff">
              <div class="name">${esc(SIGNOFF_NAME)}</div>
              <div class="row">
                <div>${esc(SIGNOFF_PHONE)}</div>
                <div class="sep"></div>
                <div>${esc(SIGNOFF_SITE)}</div>
              </div>
              <div class="role">${esc(SIGNOFF_ROLE)}</div>
            </div>
          </div>
        </div>`;
    }

    else {
      html = `
        <div class="slide bg2">
          <div class="glow blue-cr"></div>
          ${chrome()}
          <div class="stage">
            <div class="h1" style="font-size:64px;">${esc(data.title || 'Untitled')}</div>
          </div>
        </div>`;
    }

    root.innerHTML = html;
  }
  render();
</script>
</body>
</html>
