<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>POV Guy Carousel Slide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ===== POV GUY CAROUSEL v6 — "Punchy Type" design language =====
     - Warm dark bg #0a0610 (off-black with a hint of violet)
     - Single yellow accent #fbbf24 (no more blue/red/gold chorus)
     - Space Grotesk 700/800 for display, Inter for body, IBM Plex Mono for chrome
     - Strikethrough + yellow word combo as signature pattern
     - 1080×1350 IG carousel canvas. Container queries scale type.
     - Cover slide: image-bg + scrim for twilight/hero feel.
  */
  :root {
    --bg:      #0a0610;
    --bg-dim:  #060410;
    --text:    #f5f5f7;
    --muted:   #a1a1aa;
    --muted2:  #6b6b73;
    --rule:    rgba(255,255,255,0.08);
    --accent:  #fbbf24;         /* yellow — the ONLY accent */
    --accent-glow: rgba(251,191,36,0.35);
    --down:    #ff6b6b;
    --up:      #5cf28a;

    --mono:    'IBM Plex Mono', monospace;
    --display: 'Space Grotesk', sans-serif;
    --body:    'Inter', sans-serif;

    --slide-w: 1080px;
    --slide-h: 1350px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: var(--slide-w);
    height: var(--slide-h);
    overflow: hidden;
    background: #000;
    font-family: var(--body);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  html.overlay-render, body.overlay-render { background: transparent !important; }

  /* ===== Base slide canvas ===== */
  .slide {
    position: relative;
    width: var(--slide-w);
    height: var(--slide-h);
    background: var(--bg);
    color: var(--text);
    font-family: var(--display);
    overflow: hidden;
    container-type: inline-size;
  }
  .slide.overlay-mode { background: transparent; }

  /* ===== Common chrome — eyebrow + footer + slide-num ===== */
  .eyebrow {
    position: absolute; top: 7%; left: 7%;
    font-family: var(--mono);
    font-size: 4cqw;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex; align-items: center; gap: 1.5cqw;
    max-width: 86%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    z-index: 4;
  }
  .eyebrow .dot {
    width: 1.6cqw; height: 1.6cqw; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent-glow);
    flex-shrink: 0;
  }
  .footer {
    position: absolute; bottom: 5.5%; left: 7%; right: 7%;
    display: flex; justify-content: space-between; align-items: end;
    gap: 2cqw;
    font-family: var(--mono);
    font-size: 3.2cqw;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted2);
    pointer-events: none;
    z-index: 4;
  }
  /* Source on the LEFT can shrink/ellipsis. Slide num on the RIGHT must NEVER
     be clipped — it's the only nav cue. Long source strings like
     "URA CAVEATS · SRX · POV GUY ANALYSIS" used to push "05 / 10" off-screen. */
  .footer .src {
    flex: 1 1 auto;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .footer .num {
    flex: 0 0 auto;
    white-space: nowrap;
    color: var(--accent);
    font-weight: 500;
  }

  /* ===== Cover — image-bg + scrim (only the cover uses image background) ===== */
  .cover-img {
    position: absolute; inset: 0;
    background-color: #0a0610;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    z-index: 0;
  }
  .cover-img.placeholder {
    /* Fallback gradient if cover-enhancer hasn't baked an AI image in yet */
    background:
      radial-gradient(ellipse 90% 55% at 50% 75%, rgba(251,160,80,0.28) 0%, transparent 60%),
      linear-gradient(to bottom,
        #1d1428 0%, #2a1d35 22%, #4a2c3d 45%, #7a4530 68%, #b56a35 85%, #d68645 100%),
      #0a0610;
  }
  .cover-img.placeholder::after {
    content: '';
    position: absolute; left: 0; right: 0; bottom: 0; height: 38%;
    background:
      linear-gradient(to top, #060410 0%, #0a0610 35%, transparent 100%),
      linear-gradient(to top,
        rgba(8,5,15,0.95) 0%, rgba(8,5,15,0.95) 35%,
        transparent 35.1%, transparent 38%,
        rgba(8,5,15,0.85) 38.1%, rgba(8,5,15,0.85) 42%,
        transparent 42.1%, transparent 50%,
        rgba(8,5,15,0.7) 50.1%, rgba(8,5,15,0.7) 53%,
        transparent 53.1%);
  }
  .cover-scrim {
    position: absolute; inset: 0;
    background:
      linear-gradient(to bottom,
        rgba(10,6,16,0.78) 0%,
        rgba(10,6,16,0.30) 18%,
        rgba(10,6,16,0.10) 35%,
        rgba(10,6,16,0.55) 60%,
        rgba(10,6,16,0.92) 88%,
        rgba(10,6,16,0.98) 100%);
    z-index: 1;
  }
  .cover .stage {
    position: absolute; top: 16%; bottom: 13%; left: 7%; right: 7%;
    display: flex; flex-direction: column;
    justify-content: flex-end;
    padding-bottom: 2%;
    z-index: 2;
  }
  .cover .badge {
    font-family: var(--mono);
    font-size: 3.2cqw;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 5cqw;
    text-shadow: 0 0 20px rgba(0,0,0,0.5);
  }
  .cover h1 {
    font-family: var(--display);
    font-weight: 800;
    font-size: 15cqw;          /* base; fitCoverTitle() shrinks ONLY when needed */
    line-height: 0.94;
    letter-spacing: -0.04em;
    color: var(--text);
    text-shadow: 0 4px 32px rgba(0,0,0,0.55), 0 1px 2px rgba(0,0,0,0.8);
    max-width: 100%;
  }
  .cover h1 .strike {
    color: var(--muted); text-decoration: line-through;
    text-decoration-thickness: 0.5cqw;
  }
  .cover h1 .yellow {
    color: var(--accent);
    text-shadow: 0 4px 32px rgba(0,0,0,0.65), 0 0 24px var(--accent-glow);
  }
  .cover .sub {
    margin-top: 4cqw;
    font-family: var(--body);
    font-weight: 400;
    font-size: 3.6cqw;
    line-height: 1.4;
    color: #d8d6e0;
    max-width: 80%;
    text-shadow: 0 2px 12px rgba(0,0,0,0.7);
  }
  .cover .eyebrow, .cover .footer { z-index: 3; }
  .cover .eyebrow, .cover .footer span { text-shadow: 0 0 12px rgba(0,0,0,0.6); }

  /* ===== Context — one-sentence frame (slot 02) ===== */
  .context .stage {
    position: absolute; top: 16%; bottom: 13%; left: 7%; right: 7%;
    display: flex; flex-direction: column; justify-content: center;
  }
  .context .lead {
    font-family: var(--mono);
    font-size: 2.6cqw;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 4cqw;
  }
  .context h2 {
    font-family: var(--display);
    font-weight: 800;
    font-size: 11cqw;
    line-height: 0.96;
    letter-spacing: -0.035em;
    color: var(--text);
  }
  .context h2 .yellow { color: var(--accent); }
  .context h2 .strike {
    color: var(--muted); text-decoration: line-through;
    text-decoration-thickness: 0.4cqw;
  }
  .context .meta { margin-top: 5cqw; display: flex; gap: 2cqw; flex-wrap: wrap; }
  .context .chip {
    font-family: var(--mono);
    font-size: 2.2cqw;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--rule);
    padding: 1.2cqw 2.2cqw;
    border-radius: 999px;
  }
  .context .chip.hot { color: var(--accent); border-color: rgba(251,191,36,0.4); }

  /* ===== Stat — number is the design ===== */
  .stat .stage {
    position: absolute; top: 16%; bottom: 13%; left: 7%; right: 7%;
    display: flex; flex-direction: column; justify-content: center;
  }
  .stat .pre {
    font-family: var(--body);
    font-weight: 400;
    font-size: 3.4cqw;
    line-height: 1.4;
    color: var(--muted);
    max-width: 85%;
    margin-bottom: 3cqw;
  }
  .stat .pre .yellow { color: var(--accent); }
  .stat .number {
    font-family: var(--display);
    font-weight: 800;
    font-size: 32cqw;
    line-height: 0.9;
    letter-spacing: -0.055em;
    color: var(--text);
    /* Numbers must always render on a single line. The auto-fit JS shrinks
       font-size after render until scrollWidth fits container width. */
    white-space: nowrap;
    max-width: 100%;
    overflow: visible;
  }
  .stat .number.yellow { color: var(--accent); }
  .stat .number small {
    font-size: 0.35em;
    letter-spacing: -0.03em;
    vertical-align: top;
    margin-left: 0.06em;
    font-weight: 700;
  }
  .stat .post {
    margin-top: 3cqw;
    font-family: var(--body);
    font-weight: 400;
    font-size: 3.2cqw;
    line-height: 1.45;
    color: #cfcfd6;
    max-width: 92%;
  }
  .stat .delta {
    display: inline-block;
    margin-top: 3cqw;
    padding: 1.2cqw 2.4cqw;
    border: 1px solid var(--rule);
    border-radius: 999px;
    font-family: var(--mono);
    font-size: 2.2cqw;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .stat .delta.down { color: var(--down); border-color: var(--down); }
  .stat .delta.up   { color: var(--up);   border-color: var(--up); }

  /* ===== List — numbered, big body text ===== */
  .list .stage {
    position: absolute; top: 16%; bottom: 13%; left: 7%; right: 7%;
    display: flex; flex-direction: column; justify-content: center;
  }
  .list h2 {
    font-family: var(--display);
    font-weight: 800;
    font-size: 8.5cqw;
    line-height: 1.0;
    letter-spacing: -0.035em;
    color: var(--text);
    margin-bottom: 4cqw;
  }
  .list h2 .yellow { color: var(--accent); }
  .list ol { list-style: none; padding: 0; margin: 0; }
  .list ol li {
    display: flex; align-items: flex-start; gap: 3cqw;
    padding: 3.5cqw 0;
    border-top: 1px solid var(--rule);
    font-family: var(--body);
    font-weight: 400;
    font-size: 3.6cqw;
    line-height: 1.4;
    color: var(--text);
  }
  .list ol li:last-child { border-bottom: 1px solid var(--rule); }
  .list ol li .num {
    font-family: var(--mono);
    font-weight: 500;
    color: var(--accent);
    font-size: 3cqw;
    flex-shrink: 0;
    padding-top: 0.3cqw;
    letter-spacing: 0.08em;
  }
  .list ol li .body { flex: 1; }

  /* ===== Ranking — typographic, no bar charts ===== */
  .ranking .stage {
    position: absolute; top: 16%; bottom: 13%; left: 7%; right: 7%;
    display: flex; flex-direction: column; justify-content: center;
  }
  .ranking h2 {
    font-family: var(--display);
    font-weight: 800;
    font-size: 8cqw;
    line-height: 1.0;
    letter-spacing: -0.035em;
    color: var(--text);
    margin-bottom: 4cqw;
  }
  .ranking h2 .yellow { color: var(--accent); }
  .ranking .rank-row {
    display: grid;
    grid-template-columns: 8cqw 1fr auto;
    gap: 3cqw;
    align-items: baseline;
    padding: 2.4cqw 0;
    border-top: 1px solid var(--rule);
  }
  .ranking .rank-row:last-child { border-bottom: 1px solid var(--rule); }
  .ranking .rank-row .rk {
    font-family: var(--mono);
    font-size: 2.6cqw;
    letter-spacing: 0.08em;
    color: var(--muted);
  }
  .ranking .rank-row .lbl {
    font-family: var(--display);
    font-weight: 600;
    font-size: 4cqw;
    line-height: 1.1;
    color: var(--text);
  }
  .ranking .rank-row .lbl .sub {
    display: block;
    font-family: var(--mono);
    font-weight: 400;
    font-size: 2.2cqw;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-top: 0.6cqw;
    text-transform: uppercase;
  }
  .ranking .rank-row .val {
    font-family: var(--display);
    font-weight: 800;
    font-size: 5cqw;
    letter-spacing: -0.02em;
    color: var(--accent);
  }

  /* ===== POV Guy Take — opinionated pull-quote (slot 06) ===== */
  .pov_take {
    background:
      radial-gradient(ellipse 75% 60% at 20% 25%, rgba(251,191,36,0.08) 0%, transparent 65%),
      var(--bg);
  }
  .pov_take .stage {
    position: absolute; top: 16%; bottom: 13%; left: 7%; right: 7%;
    display: flex; flex-direction: column; justify-content: center;
  }
  .pov_take .label {
    font-family: var(--mono);
    font-size: 2.4cqw;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 3cqw;
    display: inline-flex; align-items: center; gap: 1.4cqw;
  }
  .pov_take .label::before {
    content: ''; display: inline-block;
    width: 6cqw; height: 1px; background: var(--accent);
  }
  .pov_take h2 {
    font-family: var(--display);
    font-weight: 800;
    font-size: 9.5cqw;
    line-height: 1.0;
    letter-spacing: -0.03em;
    color: var(--text);
  }
  .pov_take h2 .yellow { color: var(--accent); font-style: italic; }
  .pov_take .punch {
    margin-top: 5cqw;
    padding-top: 4cqw;
    border-top: 1px solid var(--rule);
    font-family: var(--body);
    font-size: 3.4cqw;
    line-height: 1.5;
    color: var(--muted);
    max-width: 86%;
  }
  .pov_take .punch strong { color: var(--text); font-weight: 600; }
  .pov_take .by {
    margin-top: 4cqw;
    font-family: var(--mono);
    font-size: 2.2cqw;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted2);
  }

  /* ===== Tip — quote-card ===== */
  .tip .stage {
    position: absolute; top: 16%; bottom: 13%; left: 7%; right: 7%;
    display: flex; flex-direction: column; justify-content: center;
  }
  .tip .qmark {
    font-family: var(--display);
    font-size: 22cqw;
    line-height: 0.8;
    color: var(--accent);
    margin-bottom: 1cqw;
  }
  .tip blockquote {
    font-family: var(--display);
    font-weight: 700;
    font-size: 7cqw;
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .tip blockquote .yellow { color: var(--accent); }
  .tip .by {
    margin-top: 5cqw;
    font-family: var(--mono);
    font-size: 2.4cqw;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ===== CTA — yellow pill button + terminal URL ===== */
  .cta .stage {
    position: absolute; top: 16%; bottom: 13%; left: 7%; right: 7%;
    display: flex; flex-direction: column; justify-content: center;
  }
  .cta .pre {
    font-family: var(--mono);
    font-size: 2.6cqw;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 3cqw;
  }
  .cta h2 {
    font-family: var(--display);
    font-weight: 800;
    font-size: 10cqw;
    line-height: 0.98;
    letter-spacing: -0.035em;
    color: var(--text);
  }
  .cta h2 .yellow { color: var(--accent); }
  .cta .sub {
    margin-top: 4cqw;
    font-family: var(--body);
    font-size: 3.4cqw;
    line-height: 1.45;
    color: var(--muted);
    max-width: 85%;
  }
  .cta .btn {
    display: inline-flex; align-items: center;
    margin-top: 5cqw;
    padding: 2.4cqw 4cqw;
    background: var(--accent);
    color: #0a0610;
    font-family: var(--display);
    font-weight: 700;
    font-size: 3.6cqw;
    letter-spacing: -0.01em;
    border-radius: 999px;
    text-decoration: none;
    width: fit-content;
  }
  .cta .url {
    margin-top: 3cqw;
    font-family: var(--mono);
    font-size: 2.6cqw;
    letter-spacing: 0.06em;
    color: var(--muted);
  }
  .cta .url .prompt { color: var(--accent); margin-right: 0.8cqw; }
  .cta .signoff {
    position: absolute; bottom: 7%; left: 7%; right: 7%;
    font-family: var(--mono);
    font-size: 2.4cqw;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted2);
    display: flex; justify-content: space-between;
  }

  /* ===== Save — engagement close (slot 10) ===== */
  .save .stage {
    position: absolute; top: 16%; bottom: 13%; left: 7%; right: 7%;
    display: flex; flex-direction: column; justify-content: center;
    align-items: center; text-align: center;
  }
  .save .arrow {
    font-family: var(--display); font-size: 22cqw; line-height: 1;
    color: var(--accent); margin-bottom: 3cqw;
    transform: rotate(-15deg);
  }
  .save h2 {
    font-family: var(--display); font-weight: 800;
    font-size: 13cqw; line-height: 0.92;
    letter-spacing: -0.035em; color: var(--text);
    margin-bottom: 3cqw;
  }
  .save h2 .yellow { color: var(--accent); }
  .save .sub {
    font-family: var(--body); font-weight: 400;
    font-size: 3.6cqw; color: var(--muted);
    line-height: 1.5; max-width: 80%;
  }

  /* ===== OVERFLOW SAFETY — three layers to prevent copy crashes ===== */
  .slide h1, .slide h2, .slide blockquote, .slide .number,
  .slide .pre, .slide .post, .slide .sub, .slide .punch, .slide .body {
    overflow-wrap: break-word;
    word-break: normal;
    hyphens: none;
    max-width: 100%;
  }
  .slide .stage > * { flex-shrink: 1; min-height: 0; }
  .stat .stage, .list .stage, .ranking .stage, .tip .stage,
  .cta .stage, .save .stage, .context .stage, .pov_take .stage {
    overflow: hidden;
  }
  /* Per-slide line clamps — safety net if AI-generated copy runs long */
  .cover h1        { display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
  .cover .sub      { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .context h2      { display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden; }
  .stat .pre       { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .stat .post      { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .list ol li .body { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .pov_take h2     { display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
  .pov_take .punch { display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
  .tip blockquote  { display: -webkit-box; -webkit-line-clamp: 6; -webkit-box-orient: vertical; overflow: hidden; }
  .cta h2          { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .cta .sub        { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .save h2         { display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
</style>
</head>
<body>
<div id="root"></div>
<script>
  /* =================================================================
     Payload shape (per slide, URL hash):
       { kind, _drop, _index, _total, _overlay, ...slide-specific }

     Slide kinds and their fields:
       cover:    { title_parts:[{text,style}], badge, sub, cover_image_url }
       context:  { lead, headline_parts:[{text,style}], chips:[{text,hot?}] }
       stat:     { pre, pre_accent, value, change, value_color, post, footnote }
       list:     { title, title_accent, items:[{body}] }
       ranking:  { title, title_accent, items:[{label, sub, value}] }
       pov_take: { label, headline_parts:[{text,style}], punch, punch_bold, by }
       tip:      { quote_parts:[{text,style}], by }
       cta:      { pre, title, title_accent, sub, url, button_sub }
                 // NOTE: no action-words on the button — pill renders ${url} →
                 //       because IG/social images can't link out
       save:     { title, title_accent, sub }
     ================================================================= */

  const payload = decodeURIComponent(location.hash.slice(1) || '%7B%7D');
  const data = JSON.parse(payload || '{}');
  const root = document.getElementById('root');

  function applyOverlayMode() {
    if (data._overlay) {
      document.documentElement.classList.add('overlay-render');
      document.body.classList.add('overlay-render');
    } else {
      document.documentElement.classList.remove('overlay-render');
      document.body.classList.remove('overlay-render');
    }
  }
  applyOverlayMode();

  function ctx() {
    return {
      drop: data._drop || {},
      idx:  data._index || 1,
      tot:  data._total || 10,
    };
  }

  const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  const SITE      = 'POVGUY.SG';
  const PHONE     = '+65 9236 1561';
  const MEETING   = 'povguy.sg/strategy-call';
  const CEA       = 'CEA R068636D';
  const SIGNOFF   = 'Farhan Adenan';

  /* Render a parts array: [{text, style:'plain'|'yellow'|'strike'|'em'}] -> HTML */
  function renderParts(parts) {
    if (!parts || !Array.isArray(parts)) return '';
    return parts.map(p => {
      const style = p.style || 'plain';
      const cls = style === 'yellow' ? 'yellow'
                : style === 'strike' ? 'strike'
                : style === 'em'     ? 'em'
                : '';
      const text = esc(p.text || '');
      if (style === 'break') return '<br>';
      return cls ? `<span class="${cls}">${text}</span>` : text;
    }).join(' ').replace(/\s*<br>\s*/g, '<br>');
  }

  /* Title + accent renderer. Handles BOTH conventions:
     - title_accent IS a substring of title → highlight in place
       e.g. title="3 Rental Truths", accent="Truths" → "3 Rental <yellow>Truths</yellow>"
     - title_accent is a SEPARATE phrase → append it after title with a space
       e.g. title="Let's map your", accent="next move." → "Let's map your <yellow>next move.</yellow>"
     Without this, the second form silently drops the accent and the title looks cut off. */
  function fmtTitle(title, accent) {
    const t = esc(title || '');
    if (!accent) return t;
    const a = esc(accent);
    if (t.includes(a)) {
      return t.replace(a, `<span class="yellow">${a}</span>`);
    }
    return `${t} <span class="yellow">${a}</span>`;
  }

  function chromeEyebrow(text) {
    return `<div class="eyebrow"><span class="dot"></span>${esc(text || '')}</div>`;
  }
  function chromeFooter(left) {
    const { idx, tot } = ctx();
    const numText = String(idx).padStart(2,'0') + ' / ' + String(tot).padStart(2,'0');
    // .src ellipsis-truncates if too long. .num is fixed-width and never clips.
    return `<div class="footer"><span class="src">${esc(left || SITE)}</span><span class="num">${numText}</span></div>`;
  }

  function render() {
    const k = data.kind || 'cover';
    const overlayMode = !!data._overlay;
    let html = '';

    /* ===== COVER ===== */
    if (k === 'cover') {
      const imgUrl = data.cover_image_url;
      const imgStyle = imgUrl ? ` style="background-image:url('${esc(imgUrl)}')"` : '';
      const imgClass = imgUrl ? 'cover-img' : 'cover-img placeholder';
      html = `
        <div class="slide cover ${overlayMode ? 'overlay-mode' : ''}">
          <div class="${imgClass}"${imgStyle}></div>
          <div class="cover-scrim"></div>
          ${chromeEyebrow(data.eyebrow || (ctx().drop.theme || 'POV Guy'))}
          <div class="stage">
            ${data.badge ? `<div class="badge">${esc(data.badge)}</div>` : ''}
            <h1>${renderParts(data.title_parts)}</h1>
            ${data.sub ? `<p class="sub">${esc(data.sub)}</p>` : ''}
          </div>
          ${chromeFooter(SITE)}
        </div>`;
    }

    /* ===== CONTEXT (slot 02 — one-sentence frame) ===== */
    else if (k === 'context') {
      const chips = (data.chips || []).map(c =>
        `<span class="chip ${c.hot ? 'hot' : ''}">${esc(c.text || '')}</span>`
      ).join('');
      html = `
        <div class="slide context">
          ${chromeEyebrow(data.eyebrow || 'What just happened')}
          <div class="stage">
            ${data.lead ? `<div class="lead">${esc(data.lead)}</div>` : ''}
            <h2>${renderParts(data.headline_parts)}</h2>
            ${chips ? `<div class="meta">${chips}</div>` : ''}
          </div>
          ${chromeFooter(data.source || 'SRX · URA · POV Guy')}
        </div>`;
    }

    /* ===== STAT ===== */
    else if (k === 'stat') {
      const change = String(data.change || '');
      const isDown = change.trim().startsWith('-') || /−/.test(change);
      const isUp   = change.trim().startsWith('+');
      const deltaClass = isDown ? 'down' : isUp ? 'up' : '';
      const valueYellow = (data.value_color || '') === 'yellow' ? 'yellow' : '';
      const pre = data.pre_accent
        ? esc(data.pre || '').replace(esc(data.pre_accent), `<span class="yellow">${esc(data.pre_accent)}</span>`)
        : esc(data.pre || '');
      html = `
        <div class="slide stat ${overlayMode ? 'overlay-mode' : ''}">
          ${chromeEyebrow(data.eyebrow || (ctx().drop.theme || 'The Number'))}
          <div class="stage">
            ${data.pre ? `<p class="pre">${pre}</p>` : ''}
            <div class="number ${valueYellow}">${esc(data.value || '')}</div>
            ${data.post ? `<p class="post">${esc(data.post)}</p>` : ''}
            ${change ? `<span class="delta ${deltaClass}">${esc(change)}</span>` : ''}
          </div>
          ${chromeFooter(data.source || 'SRX · URA')}
        </div>`;
    }

    /* ===== LIST ===== */
    else if (k === 'list') {
      const items = (data.items || []).map((it, i) => {
        const body = typeof it === 'string' ? it : (it.body || it.text || '');
        const num = String(i + 1).padStart(2, '0');
        return `<li><span class="num">${num}</span><span class="body">${esc(body)}</span></li>`;
      }).join('');
      const titleParts = fmtTitle(data.title, data.title_accent);
      html = `
        <div class="slide list">
          ${chromeEyebrow(data.eyebrow || 'Why This Matters')}
          <div class="stage">
            <h2>${titleParts}</h2>
            <ol>${items}</ol>
          </div>
          ${chromeFooter(data.source || 'MAS · IRAS · SRX')}
        </div>`;
    }

    /* ===== RANKING ===== */
    else if (k === 'ranking' || k === 'cards' || k === 'chart') {
      const rows = (data.items || data.cards || []).map((it, i) => {
        const rk = String(i + 1).padStart(2, '0');
        const sub = it.sub ? `<span class="sub">${esc(it.sub)}</span>` : '';
        return `<div class="rank-row">
          <div class="rk">${rk}</div>
          <div class="lbl">${esc(it.label || '')}${sub}</div>
          <div class="val">${esc(it.value || '')}</div>
        </div>`;
      }).join('');
      const titleParts = fmtTitle(data.title, data.title_accent);
      html = `
        <div class="slide ranking">
          ${chromeEyebrow(data.eyebrow || 'Ranked · This Week')}
          <div class="stage">
            <h2>${titleParts}</h2>
            ${rows}
          </div>
          ${chromeFooter(data.source || 'SRX · 7-day caveats')}
        </div>`;
    }

    /* ===== POV GUY TAKE (slot 06) ===== */
    else if (k === 'pov_take') {
      html = `
        <div class="slide pov_take">
          ${chromeEyebrow(data.eyebrow || 'POV Guy · Take')}
          <div class="stage">
            ${data.label ? `<div class="label">${esc(data.label)}</div>` : ''}
            <h2>${renderParts(data.headline_parts)}</h2>
            ${data.punch ? `<p class="punch">${esc(data.punch)}${data.punch_bold ? ` <strong>${esc(data.punch_bold)}</strong>` : ''}</p>` : ''}
            <div class="by">— ${esc(data.by || SIGNOFF + ' · ' + CEA)}</div>
          </div>
          ${chromeFooter(SITE)}
        </div>`;
    }

    /* ===== TIP — quote card ===== */
    else if (k === 'tip') {
      html = `
        <div class="slide tip ${overlayMode ? 'overlay-mode' : ''}">
          ${chromeEyebrow(data.eyebrow || 'POV Guy · Tip')}
          <div class="stage">
            <div class="qmark">"</div>
            <blockquote>${renderParts(data.quote_parts)}</blockquote>
            <div class="by">— ${esc(data.by || SIGNOFF + ' · POV Guy Realtor')}</div>
          </div>
          ${chromeFooter(SITE)}
        </div>`;
    }

    /* ===== CTA — yellow pill button ===== */
    else if (k === 'cta') {
      const titleParts = fmtTitle(data.title, data.title_accent);
      html = `
        <div class="slide cta">
          ${chromeEyebrow(data.eyebrow || 'Your Move')}
          <div class="stage">
            ${data.pre ? `<div class="pre">${esc(data.pre)}</div>` : ''}
            <h2>${titleParts}</h2>
            ${data.sub ? `<p class="sub">${esc(data.sub)}</p>` : ''}
            <!-- IG/social images aren't clickable → button text MUST be the URL itself,
                 never action-words like "Book a call". User has to type/remember the URL. -->
            <span class="btn">${esc(data.url || MEETING)} →</span>
            ${data.button_sub ? `<div class="url">${esc(data.button_sub)}</div>` : ''}
          </div>
          <div class="signoff">
            <span>${esc(SIGNOFF)} · ${esc(CEA)}</span>
            <span>${esc(PHONE)}</span>
          </div>
        </div>`;
    }

    /* ===== SAVE — engagement close (slot 10) ===== */
    else if (k === 'save') {
      const titleParts = fmtTitle(data.title, data.title_accent);
      html = `
        <div class="slide save">
          ${chromeEyebrow(data.eyebrow || 'One last thing')}
          <div class="stage">
            <div class="arrow">↗</div>
            <h2>${titleParts}</h2>
            ${data.sub ? `<p class="sub">${esc(data.sub)}</p>` : ''}
          </div>
          ${chromeFooter(SITE)}
        </div>`;
    }

    /* ===== FALLBACK ===== */
    else {
      html = `
        <div class="slide">
          ${chromeEyebrow('POV Guy')}
          <div class="stage" style="position:absolute;top:16%;bottom:13%;left:7%;right:7%;display:flex;align-items:center;">
            <h2 style="font-family:var(--display);font-weight:800;font-size:7cqw;line-height:1;color:var(--text)">${esc(data.title || 'Untitled')}</h2>
          </div>
          ${chromeFooter(SITE)}
        </div>`;
    }

    root.innerHTML = html;
    // Post-render fit pass: ensure giant stat numbers stay on a single line,
    // and the cover h1 fits inside its .stage box even with long titles.
    // Both done in JS (not CSS) because container queries can't condition on
    // text length / line count.
    fitOneLine();
    fitCoverTitle();
  }

  /* Shrink any element with class .fit-one-line until its scrollWidth fits the
     parent. Currently used for .stat .number (values like "S$14.85M" must not
     wrap). Steps down 4% per iteration; bails after 20 iterations as a safety. */
  function fitOneLine() {
    const targets = root.querySelectorAll('.stat .number');
    targets.forEach(el => {
      const parent = el.parentElement;
      if (!parent) return;
      const parentWidth = parent.clientWidth;
      let size = parseFloat(getComputedStyle(el).fontSize);
      let safety = 20;
      while (el.scrollWidth > parentWidth && size > 60 && safety-- > 0) {
        size *= 0.94;
        el.style.fontSize = size + 'px';
      }
    });
  }

  /* Cover h1 starts large (15cqw ≈ 162px) for stop-the-scroll punch. We shrink
     ONLY if the rendered headline overflows the .stage box. Floor: ~119px
     (≈11cqw) — anything smaller and the cover loses impact vs slides 2-3 and
     starts to look "smaller than the rest" (Farhan's complaint, 2026-04-23).
     If the title still overflows at the floor, the source copy is too long —
     the right fix is shorter copy, not smaller type. */
  function fitCoverTitle() {
    const h1 = root.querySelector('.cover h1');
    if (!h1) return;
    const stage = h1.parentElement;
    if (!stage) return;
    // Allow some breathing room for badge above + sub below if present.
    const badge = stage.querySelector('.badge');
    const sub   = stage.querySelector('.sub');
    const reservedH = (badge ? badge.getBoundingClientRect().height + 16 : 0)
                    + (sub   ? sub.getBoundingClientRect().height   + 16 : 0);
    const maxH = stage.clientHeight - reservedH - 8;
    const maxW = stage.clientWidth;
    const FLOOR = 119; // ≈11cqw on 1080w canvas
    let size = parseFloat(getComputedStyle(h1).fontSize);
    let safety = 12;
    while ((h1.scrollHeight > maxH || h1.scrollWidth > maxW) && size > FLOOR && safety-- > 0) {
      size *= 0.95;
      h1.style.fontSize = Math.max(FLOOR, size) + 'px';
    }
  }

  /* Re-render on hashchange — Playwright nav uses page.goto(template#payload)
     per slide, which triggers hashchange (not a full reload). Without this
     listener, only slide 1 would render; every PNG would be the cover. */
  function rerenderFromHash() {
    try {
      const next = JSON.parse(decodeURIComponent(location.hash.slice(1) || '%7B%7D'));
      Object.keys(data).forEach(k => delete data[k]);
      Object.assign(data, next);
      applyOverlayMode();
      render();
    } catch (e) {
      console.error('hashchange parse failed', e);
    }
  }
  window.addEventListener('hashchange', rerenderFromHash);
  render();
</script>
</body>
</html>
