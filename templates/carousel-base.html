<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>POV Guy Carousel Slide</title>
<style>
  /* POV Guy brand */
  :root {
    --bg: #0a2540;
    --bg-2: #102a4c;
    --accent: #e9b949;
    --accent-2: #ff6b35;
    --text: #ffffff;
    --text-dim: #a8b8d0;
    --positive: #4ade80;
    --negative: #f87171;
    --slide-w: 1080px;
    --slide-h: 1350px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: var(--slide-w);
    height: var(--slide-h);
    overflow: hidden;
    font-family: 'Inter', 'Helvetica Neue', sans-serif;
    color: var(--text);
    background: linear-gradient(135deg, var(--bg) 0%, var(--bg-2) 100%);
  }
  .slide {
    position: relative;
    width: var(--slide-w);
    height: var(--slide-h);
    padding: 80px 70px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  /* Brand bar */
  .brand-bar {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .brand-bar .logo-mark {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--bg);
    display: grid;
    place-items: center;
    font-weight: 900;
    font-size: 28px;
  }
  .brand-bar .brand-name {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .brand-bar .brand-name span { color: var(--accent); }

  /* Slide counter */
  .counter {
    position: absolute;
    top: 80px; right: 70px;
    font-size: 18px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  /* Cover */
  .slide.cover .badge {
    display: inline-block;
    background: var(--accent);
    color: var(--bg);
    padding: 10px 20px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 0.1em;
    margin-bottom: 32px;
  }
  .slide.cover h1 {
    font-size: 76px;
    line-height: 1.05;
    font-weight: 900;
    letter-spacing: -0.02em;
  }
  .slide.cover .subtitle {
    margin-top: 32px;
    font-size: 32px;
    line-height: 1.3;
    color: var(--text-dim);
  }

  /* Stat slide */
  .slide.stat .headline {
    font-size: 48px;
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 24px;
  }
  .slide.stat .value {
    font-size: 180px;
    font-weight: 900;
    line-height: 1;
    color: var(--accent);
    letter-spacing: -0.04em;
  }
  .slide.stat .change {
    margin-top: 16px;
    font-size: 36px;
    font-weight: 700;
  }
  .slide.stat .change.up { color: var(--positive); }
  .slide.stat .change.down { color: var(--negative); }
  .slide.stat .footnote {
    margin-top: 32px;
    font-size: 24px;
    color: var(--text-dim);
    line-height: 1.4;
  }

  /* List slide */
  .slide.list h2 {
    font-size: 56px;
    font-weight: 800;
    margin-bottom: 40px;
    line-height: 1.1;
  }
  .slide.list ol {
    list-style: none;
    counter-reset: item;
  }
  .slide.list li {
    counter-increment: item;
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 24px;
    align-items: baseline;
    padding: 20px 0;
    border-top: 1px solid rgba(255,255,255,0.1);
    font-size: 28px;
    line-height: 1.4;
  }
  .slide.list li::before {
    content: counter(item, decimal-leading-zero);
    color: var(--accent);
    font-weight: 800;
    font-size: 36px;
  }

  /* Tip slide */
  .slide.tip {
    background: linear-gradient(135deg, var(--bg) 0%, #1a3a5c 100%);
  }
  .slide.tip .tag {
    color: var(--accent);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.2em;
    margin-bottom: 24px;
  }
  .slide.tip h2 {
    font-size: 64px;
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 32px;
  }
  .slide.tip .body {
    font-size: 32px;
    line-height: 1.4;
    color: var(--text);
  }
  .slide.tip .signoff {
    margin-top: 40px;
    font-size: 24px;
    color: var(--text-dim);
    font-style: italic;
  }

  /* CTA slide */
  .slide.cta {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
    color: var(--bg);
  }
  .slide.cta h2 {
    font-size: 72px;
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -0.02em;
  }
  .slide.cta .cta-line {
    margin-top: 48px;
    font-size: 36px;
    font-weight: 700;
    line-height: 1.3;
  }
  .slide.cta .qr-zone {
    margin-top: 40px;
    background: var(--bg);
    color: var(--accent);
    padding: 32px;
    border-radius: 24px;
    font-family: 'Courier New', monospace;
    font-size: 26px;
    word-break: break-all;
    text-align: center;
  }
  .slide.cta .footer-cred {
    margin-top: 32px;
    font-size: 18px;
    color: var(--bg);
    opacity: 0.6;
  }

  /* Bottom credits (all slides except cover) */
  .footer {
    position: absolute;
    bottom: 40px; left: 70px; right: 70px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 16px;
    color: var(--text-dim);
  }
  .footer .source { letter-spacing: 0.1em; }
  .slide.cover .footer { color: var(--text-dim); }
  .slide.cta .footer { color: var(--bg); opacity: 0.7; }
</style>
</head>
<body>
<div id="root"></div>
<script>
  const payload = decodeURIComponent(location.hash.slice(1) || '%7B%7D');
  const data = JSON.parse(payload || '{}');
  const root = document.getElementById('root');

  const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  function brandBar() {
    return `
      <div class="brand-bar">
        <div class="logo-mark">P</div>
        <div class="brand-name">POV GUY <span>·</span> REALTY INTEL</div>
      </div>`;
  }

  function counter() {
    if (!data._index || !data._total) return '';
    return `<div class="counter">${String(data._index).padStart(2,'0')} / ${String(data._total).padStart(2,'0')}</div>`;
  }

  function footer() {
    const sources = (data._drop?.sources || []).join(' · ');
    return `<div class="footer">
      <div class="source">${esc(sources || 'POV GUY DATA INTEL')}</div>
      <div>CEA R068636D</div>
    </div>`;
  }

  function render() {
    const k = data.kind || 'cover';
    let html = '';
    if (k === 'cover') {
      html = `<div class="slide cover">
        <div>
          ${brandBar()}
          ${counter()}
        </div>
        <div>
          ${data.badge ? `<span class="badge">${esc(data.badge)}</span>` : ''}
          <h1>${esc(data.title)}</h1>
          <div class="subtitle">${esc(data.subtitle || '')}</div>
        </div>
        ${footer()}
      </div>`;
    } else if (k === 'stat') {
      html = `<div class="slide stat">
        <div>${brandBar()}${counter()}</div>
        <div>
          <div class="headline">${esc(data.headline)}</div>
          <div class="value">${esc(data.value)}</div>
          <div class="change ${(data.change||'').startsWith('-') ? 'down' : 'up'}">${esc(data.change || '')}</div>
          <div class="footnote">${esc(data.footnote || '')}</div>
        </div>
        ${footer()}
      </div>`;
    } else if (k === 'list') {
      const items = (data.items || []).map(i => `<li>${esc(i)}</li>`).join('');
      html = `<div class="slide list">
        <div>${brandBar()}${counter()}</div>
        <div>
          <h2>${esc(data.title)}</h2>
          <ol>${items}</ol>
        </div>
        ${footer()}
      </div>`;
    } else if (k === 'tip') {
      html = `<div class="slide tip">
        <div>${brandBar()}${counter()}</div>
        <div>
          <div class="tag">POV GUY TIP</div>
          <h2>${esc(data.title)}</h2>
          <div class="body">${esc(data.body)}</div>
          <div class="signoff">${esc(data.signoff || '— Farhan')}</div>
        </div>
        ${footer()}
      </div>`;
    } else if (k === 'cta') {
      html = `<div class="slide cta">
        <div>${brandBar()}${counter()}</div>
        <div>
          <h2>${esc(data.title)}</h2>
          <div class="cta-line">${esc(data.primary_cta || 'DM me on WhatsApp.')}</div>
          <div class="qr-zone">${esc(data.whatsapp_link || 'https://wa.me/message/D7DL37LI5GJ3H1')}</div>
          <div class="footer-cred">Farhan Adenan · CEA R068636D · L3008022J</div>
        </div>
        ${footer()}
      </div>`;
    } else {
      html = `<div class="slide"><div>${brandBar()}</div><div><h1>${esc(data.title || 'Untitled')}</h1></div>${footer()}</div>`;
    }
    root.innerHTML = html;
  }
  render();
</script>
</body>
</html>
